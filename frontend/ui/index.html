<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Option Chart</title>

    <script src="/lightweight-charts.standalone.production.js"></script>

    <style>

        #tooltip {
            position: fixed;
            display: none;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        html, body { margin: 0; height: 100%; overflow: hidden; font-family: Arial; }

        .topbar {
            padding: 6px 10px;
            background: #f4f4f4;
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 10px;
        }

        input {
            padding: 4px;
            width: 104px;
            font-size: 10px;
        }

        #goToLive {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 60px;
            z-index: 100;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        #goToLive:hover { background: #1d4ed8; }

        select {
            padding: 6px;
        }

        #currentSymbol {
            font-weight: bold;
            color: #2563eb;
        }

        #slBadge {
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            background: #333;
            color: #aaa;
            cursor: default;
            user-select: none;
            min-width: 90px;
            text-align: center;
        }
        #slBadge.pending  { background: #7c6000; color: #FFD700; }
        #slBadge.placed   { background: #7a3c00; color: #FF8C00; }
        #slBadge.hit      { background: #333;    color: #aaa;    }

        #chartLabel {
            position: absolute;
            top: 12px;
            right: 70px;       /* leave room for price axis */
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            opacity: 0.55;
            user-select: none;
        }
        #chartLabel .cl-index  { color: #6b7280; }
        #chartLabel .cl-strike { color: #b45309; }
        #chartLabel .cl-ce     { color: #15803d; }
        #chartLabel .cl-pe     { color: #b91c1c; }

        /* ── Buy / Sell buttons ── */
        #orderBar {
            position: fixed;
            top: 42px;
            left: 12px;
            z-index: 200;
            display: flex;
            align-items: stretch;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.45);
            font-family: Arial, sans-serif;
            user-select: none;
        }
        .ob-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 11px;
            cursor: pointer;
            border: none;
            min-width: 46px;
            gap: 1px;
            transition: filter 0.15s;
        }
        .ob-btn:hover { filter: brightness(1.15); }
        .ob-btn:active { filter: brightness(0.9); }
        .ob-buy  { background: #16a34a; color: #fff; }
        .ob-sell { background: #dc2626; color: #fff; }
        .ob-calc { background: #1e293b; color: #94a3b8; cursor: pointer; border: none; padding: 4px 7px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; }
        .ob-calc:hover { background: #334155; }
        .ob-label { font-size: 9px; font-weight: bold; letter-spacing: 0.5px; opacity: 0.85; }
        .ob-price { font-size: 11px; font-weight: bold; }
        .ob-qty   { font-size: 9px; opacity: 0.8; }
        .ob-lots  { font-size: 8px; opacity: 0.65; }
        /* ── Order-type toggle group ── */
        .ob-type-group {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            background: #0f172a;
        }
        .ob-type-btn {
            flex: 1;
            border: none;
            cursor: pointer;
            font-size: 8px;
            font-weight: bold;
            letter-spacing: 0.4px;
            padding: 0 7px;
            color: #64748b;
            background: transparent;
            transition: background 0.12s, color 0.12s;
            white-space: nowrap;
        }
        .ob-type-btn:hover { background: #1e293b; color: #94a3b8; }
        .ob-type-btn.active { background: #334155; color: #f1f5f9; }

        /* ── Quantity calculator popup ── */
        #qtyPopup {
            display: none;
            position: fixed;
            z-index: 300;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 7px;
            padding: 8px 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.6);
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            min-width: 140px;
            text-align: center;
        }
        #qtyPopup h4 { margin: 0 0 6px; font-size: 10px; color: #94a3b8; font-weight: normal; }
        .qty-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .qty-btn { width: 22px; height: 22px; border-radius: 4px; border: none; background: #334155; color: #e2e8f0; font-size: 14px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
        .qty-btn:hover { background: #475569; }
        #qtyDisplay { font-size: 13px; font-weight: bold; color: #f1f5f9; width: 48px; background: #0f172a; border: 1px solid #475569; border-radius: 4px; text-align: center; padding: 3px 4px; appearance: textfield; -moz-appearance: textfield; }
        #qtyDisplay::-webkit-inner-spin-button, #qtyDisplay::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; }
        #lotsDisplay { font-size: 10px; color: #64748b; margin-bottom: 3px; }
        #qtyClose { margin-top: 5px; background: #0f172a; border: 1px solid #334155; color: #94a3b8; border-radius: 4px; padding: 3px 12px; cursor: pointer; font-size: 10px; }
        #qtyClose:hover { background: #1e293b; }

        /* ── SL config popup ── */
        #slConfigPopup {
            display: none;
            position: fixed;
            z-index: 300;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 7px;
            padding: 10px 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.6);
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            min-width: 170px;
        }
        #slConfigPopup h4 { margin: 0 0 8px; font-size: 10px; color: #94a3b8; font-weight: normal; letter-spacing: 0.4px; }
        .slcfg-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
        .slcfg-row label { font-size: 9px; color: #94a3b8; white-space: nowrap; }
        .slcfg-input {
            width: 56px; font-size: 11px; font-weight: bold; color: #f1f5f9;
            background: #0f172a; border: 1px solid #475569; border-radius: 4px;
            text-align: center; padding: 3px 4px;
            appearance: textfield; -moz-appearance: textfield;
        }
        .slcfg-input::-webkit-inner-spin-button,
        .slcfg-input::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; }
        #slConfigClose { margin-top: 4px; width: 100%; background: #0f172a; border: 1px solid #334155; color: #94a3b8; border-radius: 4px; padding: 3px 0; cursor: pointer; font-size: 10px; }
        #slConfigClose:hover { background: #1e293b; }

        /* ── Layout picker ── */
        #layoutBtn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            height: 22px;
        }
        #layoutBtn:hover { background: #e4e4e4; }
        #layoutBtn svg { display: block; }

        #layoutPopup {
            display: none;
            position: fixed;
            z-index: 400;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 7px;
            padding: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            font-family: Arial, sans-serif;
        }
        #layoutPopup .lp-title {
            font-size: 9px;
            color: #64748b;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .lp-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .lp-row {
            display: flex;
            gap: 5px;
        }
        .lp-option {
            width: 36px;
            height: 26px;
            border: 1px solid #475569;
            border-radius: 3px;
            background: #0f172a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            box-sizing: border-box;
            transition: border-color 0.12s, background 0.12s;
        }
        .lp-option:hover   { border-color: #94a3b8; background: #1e293b; }
        .lp-option.active  { border-color: #3b82f6; background: #1e3a5f; }
        .lp-option svg rect { fill: #475569; }
        .lp-option:hover svg rect   { fill: #94a3b8; }
        .lp-option.active svg rect  { fill: #3b82f6; }

        /* ── Toast notifications ── */
        #toastContainer {
            position: fixed;
            top: 54px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
            opacity: 1;
            transition: opacity 0.4s ease;
            max-width: 320px;
            white-space: pre-wrap;
        }
        .toast.success { background: #15803d; border-left: 4px solid #4ade80; }
        .toast.error   { background: #b91c1c; border-left: 4px solid #f87171; }
        .toast.info    { background: #1d4ed8; border-left: 4px solid #93c5fd; }
        .toast.warn    { background: #92400e; border-left: 4px solid #fbbf24; }

        /* ── Chart grid & panels ── */
        #chartGrid {
            display: grid;
            width: 100vw;
            gap: 1px;
            background: #2a2a2a;
            overflow: hidden;
        }
        .chart-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            background: #000;
            overflow: hidden;
        }
        .chart-panel.active::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #60a5fa;
            pointer-events: none;
            z-index: 9999;
        }
        .panel-label {
            position: absolute;
            top: 10px;
            right: 70px;
            z-index: 10;
            pointer-events: none;
            font-size: 13px;
            font-weight: bold;
            opacity: 0.55;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
            user-select: none;
        }
        .panel-chart-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="topbar">
    <span>Symbol:</span>
    <input list="symbolList" id="symbolSelect" placeholder="Search strike...">
    <datalist id="symbolList"></datalist>
    <span id="slBadge">SL: —</span>
    <!-- Layout picker button -->
    <button id="layoutBtn" title="Select layout" onclick="toggleLayoutPopup(event)">
        <svg width="14" height="12" viewBox="0 0 14 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="6" height="5" rx="0.5" fill="currentColor"/>
            <rect x="8" y="0" width="6" height="5" rx="0.5" fill="currentColor"/>
            <rect x="0" y="7" width="6" height="5" rx="0.5" fill="currentColor"/>
            <rect x="8" y="7" width="6" height="5" rx="0.5" fill="currentColor"/>
        </svg>
    </button>
</div>

<!-- Layout picker popup -->
<div id="layoutPopup">
    <div class="lp-title">Layout</div>
    <div class="lp-grid">
        <!-- Row: 1 panel -->
        <div class="lp-row">
            <div class="lp-option active" data-layout="1" title="Single" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="30" height="20" rx="1"/></svg>
            </div>
        </div>
        <!-- Row: 2 panels -->
        <div class="lp-row">
            <div class="lp-option" data-layout="2h" title="2 - Side by side" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="14" height="20" rx="1"/><rect x="16" y="0" width="14" height="20" rx="1"/></svg>
            </div>
            <div class="lp-option" data-layout="2v" title="2 - Stacked" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="30" height="9" rx="1"/><rect x="0" y="11" width="30" height="9" rx="1"/></svg>
            </div>
        </div>
        <!-- Row: 4 panels (first only) -->
        <div class="lp-row">
            <div class="lp-option" data-layout="4" title="4 - 2×2 Grid" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="14" height="9" rx="1"/><rect x="16" y="0" width="14" height="9" rx="1"/><rect x="0" y="11" width="14" height="9" rx="1"/><rect x="16" y="11" width="14" height="9" rx="1"/></svg>
            </div>
        </div>
        <!-- Row: 6 panels (first two) -->
        <div class="lp-row">
            <div class="lp-option" data-layout="6a" title="6 - 2 rows × 3 cols" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="8" height="9" rx="1"/><rect x="11" y="0" width="8" height="9" rx="1"/><rect x="22" y="0" width="8" height="9" rx="1"/><rect x="0" y="11" width="8" height="9" rx="1"/><rect x="11" y="11" width="8" height="9" rx="1"/><rect x="22" y="11" width="8" height="9" rx="1"/></svg>
            </div>
            <div class="lp-option" data-layout="6b" title="6 - 3 rows × 2 cols" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="14" height="5" rx="1"/><rect x="16" y="0" width="14" height="5" rx="1"/><rect x="0" y="7" width="14" height="5" rx="1"/><rect x="16" y="7" width="14" height="5" rx="1"/><rect x="0" y="14" width="14" height="6" rx="1"/><rect x="16" y="14" width="14" height="6" rx="1"/></svg>
            </div>
        </div>
        <!-- Row: 8 panels (first two) -->
        <div class="lp-row">
            <div class="lp-option" data-layout="8a" title="8 - 2 rows × 4 cols" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="6" height="9" rx="1"/><rect x="8" y="0" width="6" height="9" rx="1"/><rect x="16" y="0" width="6" height="9" rx="1"/><rect x="24" y="0" width="6" height="9" rx="1"/><rect x="0" y="11" width="6" height="9" rx="1"/><rect x="8" y="11" width="6" height="9" rx="1"/><rect x="16" y="11" width="6" height="9" rx="1"/><rect x="24" y="11" width="6" height="9" rx="1"/></svg>
            </div>
            <div class="lp-option" data-layout="8b" title="8 - 4 rows × 2 cols" onclick="selectLayout(this)">
                <svg viewBox="0 0 30 20" width="30" height="20"><rect x="0" y="0" width="14" height="3" rx="1"/><rect x="16" y="0" width="14" height="3" rx="1"/><rect x="0" y="5" width="14" height="3" rx="1"/><rect x="16" y="5" width="14" height="3" rx="1"/><rect x="0" y="10" width="14" height="3" rx="1"/><rect x="16" y="10" width="14" height="3" rx="1"/><rect x="0" y="15" width="14" height="5" rx="1"/><rect x="16" y="15" width="14" height="5" rx="1"/></svg>
            </div>
        </div>
    </div>
</div>

<div id="chartGrid"></div>
<button id="goToLive">&#9654; Latest</button>
<div id="tooltip"></div>
<div id="toastContainer"></div>

<!-- Buy / Sell order bar -->
<div id="orderBar">
    <div class="ob-type-group" id="typeGroupLeft">
        <button class="ob-type-btn active" data-type="L"  onclick="setOrderType('L')">L</button>
        <button class="ob-type-btn"        data-type="M"  onclick="setOrderType('M')">M</button>
        <button class="ob-type-btn"        data-type="SL" onclick="setOrderType('SL')">SL</button>
    </div>
    <button class="ob-btn ob-buy" id="btnBuy" onclick="placeOrder('BUY')">
        <span class="ob-label">BUY</span>
        <span class="ob-price" id="buyPrice">—</span>
        <span class="ob-qty"   id="buyQty">65</span>
    </button>
    <button class="ob-calc" id="btnCalc" onclick="toggleQtyPopup(event)">
        <span class="ob-label">QTY</span>
        <span class="ob-qty"   id="calcQtyDisplay">65</span>
        <span class="ob-lots"  id="calcLotsDisplay">1 lot</span>
    </button>
    <button class="ob-btn ob-sell" id="btnSell" onclick="placeOrder('SELL')">
        <span class="ob-label">SELL</span>
        <span class="ob-price" id="sellPrice">—</span>
        <span class="ob-qty"   id="sellQty">65</span>
    </button>
    <div class="ob-type-group" id="typeGroupRight">
        <button class="ob-type-btn active" data-type="L"  onclick="setOrderType('L')">L</button>
        <button class="ob-type-btn"        data-type="M"  onclick="setOrderType('M')">M</button>
        <button class="ob-type-btn"        data-type="SL" onclick="setOrderType('SL')">SL</button>
    </div>
</div>

<!-- SL order config popup -->
<div id="slConfigPopup">
    <h4>SL Order Settings</h4>
    <div class="slcfg-row">
        <label>Trigger Buffer</label>
        <input id="slBufInput" class="slcfg-input" type="number" min="0.05" step="0.05" value="0.20">
    </div>
    <div class="slcfg-row">
        <label>Distance from LTP</label>
        <input id="slDistInput" class="slcfg-input" type="number" min="0.5" step="0.5" value="5">
    </div>
    <button id="slConfigClose" onclick="closeSlConfig()">Done</button>
</div>

<!-- Quantity calculator popup -->
<div id="qtyPopup">
    <h4 id="qtyPopupTitle">Quantity (NIFTY · 65/lot)</h4>
    <div id="lotsDisplay">1 lot</div>
    <div class="qty-row">
        <button class="qty-btn" id="btnMinus">−</button>
        <input id="qtyDisplay" type="number" min="1" value="65">
        <button class="qty-btn" id="btnPlus">+</button>
    </div>
    <button id="qtyClose" onclick="toggleQtyPopup()">Done</button>
</div>

<script>
/* ======================
   CHART OPTIONS FACTORY
====================== */
function makeChartOptions(w, h) {
    return {
        width: w, height: h,
        timeScale: {
            timeVisible: true, secondsVisible: true, rightOffset: 40,
            tickMarkFormatter: (time) => {
                const date = new Date(time * 1000);
                return date.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
            }
        },
        rightPriceScale: { autoScale: true, scaleMargins: { top: 0.2, bottom: 0.2 } },
        localization: {
            locale: 'en-IN',
            timeFormatter: (time) => {
                const date = new Date(time * 1000);
                return date.toLocaleString('en-IN', {
                    timeZone: 'Asia/Kolkata', day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
                });
            }
        },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
    };
}

/* ======================
   CONSTANTS & GLOBALS
====================== */
const INTERVAL  = 5;
const LOT_SIZES = { NIFTY: 65, SENSEX: 20, BANKNIFTY: 30 };
const SL_COLOR  = { pending: '#FFD700', placed: '#FF8C00', hit: '#808080' };
const LAYOUT_CONFIGS = {
    '1':  { cols: 1, rows: 1 }, '2h': { cols: 2, rows: 1 }, '2v': { cols: 1, rows: 2 },
    '4':  { cols: 2, rows: 2 }, '6a': { cols: 3, rows: 2 }, '6b': { cols: 2, rows: 3 },
    '8a': { cols: 4, rows: 2 }, '8b': { cols: 2, rows: 4 },
};

let strikeMap   = {};
let panels      = [];
let activePanel = null;
let activeLayout = '1';

// Order bar state (shared, reflects active panel)
let currentLTP   = null;
let orderLots    = 1;
let orderLotSize = 65;
let orderType    = 'L';
let slBuffer     = 0.20;
let slDistance   = 5;

/* ======================
   PANEL FACTORY
====================== */
function createPanel(id) {
    // ── DOM ───────────────────────────────────────
    const panelEl = document.createElement('div');
    panelEl.className = 'chart-panel';

    const chartAreaEl = document.createElement('div');
    chartAreaEl.className = 'panel-chart-area';

    const labelEl = document.createElement('div');
    labelEl.className = 'panel-label';
    chartAreaEl.appendChild(labelEl);

    panelEl.appendChild(chartAreaEl);
    document.getElementById('chartGrid').appendChild(panelEl);

    // ── Chart ─────────────────────────────────────
    const chart = LightweightCharts.createChart(chartAreaEl, makeChartOptions(400, 300));
    const candleSeries = chart.addBarSeries({ upColor: '#22c55e', downColor: '#ef4444', thinBars: true });

    // ── Per-panel state ───────────────────────────
    let symbol         = null;
    let socket         = null;
    let reconnectTimeout = null;
    let currentCandle  = null;
    let gapDetails     = new Map();
    let historyLoaded  = false;
    let lastCandleTime = null;
    let crosshairPrice = null;
    let slPriceLine    = null;
    let slPrice        = null;
    let slLineState    = 'none';
    let slOrderId      = null;
    let slDragging     = false;
    let slPollTimer    = null;

    // ── Chart crosshair ───────────────────────────
    chart.subscribeCrosshairMove(param => {
        if (!param.point) {
            document.getElementById('tooltip').style.display = 'none';
            return;
        }
        // crosshairPrice only tracked on active panel
        if (panel === activePanel) {
            const price = candleSeries.coordinateToPrice(param.point.y);
            if (price !== null) crosshairPrice = price;
        }
        const tooltip = document.getElementById('tooltip');
        if (!param.time || !gapDetails.has(param.time)) { tooltip.style.display = 'none'; return; }
        const g = gapDetails.get(param.time);
        tooltip.innerHTML = `<b>Gap ${g.dir}</b><br/>From: ${g.from}<br/>To: ${g.to}<br/>Jump: ${g.jump}<br/>Range: ${g.rangeLow} → ${g.rangeHigh}<br/><b>Volume:</b> ${g.volume}`;
        // offset by panel position so tooltip appears in the correct panel
        const rect = chartAreaEl.getBoundingClientRect();
        tooltip.style.left = (rect.left + param.point.x + 15) + 'px';
        tooltip.style.top  = (rect.top  + param.point.y + 15) + 'px';
        tooltip.style.display = 'block';
    });

    chart.timeScale().subscribeVisibleTimeRangeChange((range) => {
        if (panel !== activePanel) return;
        const btn = document.getElementById('goToLive');
        if (!range || !lastCandleTime) { btn.style.display = 'none'; return; }
        btn.style.display = lastCandleTime > range.to ? 'flex' : 'none';
    });

    // ── Helpers ───────────────────────────────────
    function getBucketTime(t) { return Math.floor(t / INTERVAL) * INTERVAL; }

    function updateChartLabel(sym) {
        if (!sym) { labelEl.innerHTML = ''; return; }
        const index = sym.startsWith('SENSEX') ? 'SENSEX' : sym.startsWith('BANKNIFTY') ? 'BANKNIFTY' : 'NIFTY';
        const display = Object.keys(strikeMap).find(k => strikeMap[k] === sym);
        if (!display) { labelEl.innerHTML = ''; return; }
        const part = display.split('|')[1]?.trim() || '';
        const [strike, type] = part.split(' ');
        if (!strike || !type) { labelEl.innerHTML = ''; return; }
        const tc = type === 'CE' ? 'cl-ce' : 'cl-pe';
        labelEl.innerHTML = `<span class="cl-index">${index}</span><span class="cl-index">·</span><span class="cl-strike">${strike}</span><span class="cl-index">·</span><span class="${tc}">${type}</span>`;
    }

    function refreshMarkers() {
        candleSeries.setMarkers(Array.from(gapDetails.entries()).map(([time, info]) => ({
            time,
            position: info.dir === 'D' ? 'aboveBar' : 'belowBar',
            color: info.isFilled ? (info.dir === 'D' ? 'rgba(0,128,0,0.3)' : 'rgba(255,0,0,0.3)') : (info.dir === 'D' ? 'green' : 'red'),
            shape: 'text', text: info.dir
        })));
    }

    function checkGapFill(candle) {
        let updated = false;
        gapDetails.forEach(gap => {
            if (!gap.isFilled && ((gap.dir === 'D' && candle.low <= gap.from) || (gap.dir === 'U' && candle.high >= gap.from))) {
                gap.isFilled = true; updated = true;
            }
        });
        if (updated) refreshMarkers();
    }

    // ── SL ────────────────────────────────────────
    function updateSLLineLocal(price, state) {
        if (slPriceLine) { candleSeries.removePriceLine(slPriceLine); slPriceLine = null; }
        if (price == null || state === 'none') {
            slPrice = null; slLineState = 'none';
            if (panel === activePanel) updateSLBadge();
            return;
        }
        slPrice = price; slLineState = state;
        slPriceLine = candleSeries.createPriceLine({
            price, color: SL_COLOR[state] || SL_COLOR.pending,
            lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: `SL ${price}`
        });
        if (panel === activePanel) updateSLBadge();
    }

    function stopSLPoll() { if (slPollTimer) { clearInterval(slPollTimer); slPollTimer = null; } }

    function startSLPoll(sym) {
        stopSLPoll();
        slPollTimer = setInterval(async () => {
            if (!sym) return;
            const res = await fetch(`/api/sl/${sym}`);
            const data = await res.json();
            if (data.state && data.state !== 'none') {
                const price = data.price || slPrice;
                if (data.state !== slLineState || price !== slPrice) {
                    updateSLLineLocal(price, data.state);
                    slOrderId = data.order_id || null;
                }
                if (data.state === 'hit') setTimeout(() => updateSLLineLocal(price, 'pending'), 2000);
            }
        }, 2000);
    }

    async function loadSLStateLocal(sym) {
        updateSLLineLocal(null, 'none'); slOrderId = null;
        try {
            const res = await fetch(`/api/sl/${sym}`);
            const data = await res.json();
            if (data.state && data.state !== 'none' && data.price) {
                updateSLLineLocal(data.price, data.state);
                slOrderId = data.order_id || null;
            }
        } catch (_) {}
    }

    // ── SL drag ───────────────────────────────────
    function isNearSL(clientY) {
        if (!slPrice) return false;
        const rect = chartAreaEl.getBoundingClientRect();
        const slY  = candleSeries.priceToCoordinate(slPrice);
        return slY !== null && Math.abs((clientY - rect.top) - slY) < 8;
    }
    function disableScroll() { chart.applyOptions({ handleScroll: { mouseWheel: true, pressedMouseMove: false, horzTouchDrag: false, vertTouchDrag: false } }); }
    function enableScroll()  { chart.applyOptions({ handleScroll: { mouseWheel: true, pressedMouseMove: true,  horzTouchDrag: true,  vertTouchDrag: true  } }); }

    chartAreaEl.addEventListener('mousemove', e => {
        if (!slPrice) return;
        const y = e.clientY - chartAreaEl.getBoundingClientRect().top;
        if (isNearSL(e.clientY)) { chartAreaEl.style.cursor = 'ns-resize'; disableScroll(); }
        else if (!slDragging)    { chartAreaEl.style.cursor = 'default';   enableScroll();  }
        if (slDragging) {
            const p = candleSeries.coordinateToPrice(y);
            if (p !== null) updateSLLineLocal(Math.round(p * 20) / 20, slLineState === 'none' ? 'pending' : slLineState);
        }
    });

    chartAreaEl.addEventListener('mousedown', e => {
        if (slPrice && isNearSL(e.clientY)) { slDragging = true; disableScroll(); e.stopPropagation(); }
    });

    chartAreaEl.addEventListener('mouseup', async () => {
        if (!slDragging) return;
        slDragging = false; chartAreaEl.style.cursor = 'default'; enableScroll();
        if (!slPrice || !symbol) return;
        await fetch('/api/sl/set', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ symbol, price: slPrice }) });
    });

    chartAreaEl.addEventListener('dblclick', async () => {
        if (!symbol || crosshairPrice === null) return;
        const p = Math.round(crosshairPrice * 20) / 20;
        updateSLLineLocal(p, 'pending');
        await fetch('/api/sl/set', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ symbol, price: p }) });
    });

    // ── WebSocket ─────────────────────────────────
    function connectWebSocket(sym) {
        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${proto}//${window.location.host}/ws/${sym}`);
        socket.onopen = () => console.log(`[P${id}] Connected:`, sym);
        socket.onmessage = event => {
            if (!historyLoaded || !symbol) return;
            const tick = JSON.parse(event.data);
            if (tick.type === 'ping') return;
            if (tick.symbol && tick.symbol !== symbol) return;
            const bucketTime = getBucketTime(Math.floor(Number(tick.time)));
            const price = tick.value;
            if (lastCandleTime !== null && bucketTime < lastCandleTime) return;
            if (tick.is_gap) {
                const dir = tick.direction === "UP" ? "D" : "U";
                gapDetails.set(bucketTime, {
                    dir, from: tick.prev_price, to: price,
                    jump: Math.abs(price - tick.prev_price).toFixed(2),
                    rangeLow: Math.min(tick.prev_price, price), rangeHigh: Math.max(tick.prev_price, price),
                    volume: tick.vol_change || 0, isFilled: false
                });
                refreshMarkers();
            }
            if (!currentCandle || bucketTime > currentCandle.time) {
                currentCandle = { time: bucketTime, open: price, high: price, low: price, close: price };
            } else if (bucketTime === currentCandle.time) {
                currentCandle.high  = Math.max(currentCandle.high,  price);
                currentCandle.low   = Math.min(currentCandle.low,   price);
                currentCandle.close = price;
            } else return;
            if (panel === activePanel) updateOrderBar(price);
            if (currentCandle && !isNaN(currentCandle.open)) candleSeries.update(currentCandle);
            checkGapFill(currentCandle);
        };
        socket.onclose = event => {
            if (event.target._intentionalClose || !symbol) return;
            reconnectTimeout = setTimeout(() => connectWebSocket(symbol), 3000);
        };
        socket.onerror = () => socket.close();
    }

    // ── Load symbol ───────────────────────────────
    async function panelLoadSymbol(sym) {
        if (!sym) return;
        historyLoaded = false; symbol = sym;
        const display = Object.keys(strikeMap).find(k => strikeMap[k] === sym) || sym;
        updateChartLabel(sym);
        if (panel === activePanel) {
            document.getElementById('symbolSelect').value = display;
            resetOrderBar(sym);
        }
        if (socket) { socket._intentionalClose = true; socket.close(); socket = null; }
        if (reconnectTimeout) { clearTimeout(reconnectTimeout); reconnectTimeout = null; }
        candleSeries.setData([]); currentCandle = null; gapDetails.clear(); lastCandleTime = null;
        stopSLPoll();
        const [histRes, gapRes] = await Promise.all([fetch(`/api/history/${sym}`), fetch(`/api/gaps/${sym}`)]);
        const history = await histRes.json();
        const gapsRaw = await gapRes.json();
        const candles = history.map(c => ({ time: c.time - 19800, open: c.open, high: c.high, low: c.low, close: c.close }));
        lastCandleTime = candles.length ? candles[candles.length - 1].time : null;
        gapsRaw.forEach(g => {
            const dir = g.direction === 'UP' ? 'D' : 'U';
            gapDetails.set(g.time - 19800, {
                dir, from: g.prev_price, to: g.curr_price,
                jump: Math.abs(g.curr_price - g.prev_price).toFixed(2),
                rangeLow: Math.min(g.prev_price, g.curr_price), rangeHigh: Math.max(g.prev_price, g.curr_price),
                volume: g.vol_change || 0, isFilled: false
            });
        });
        candles.forEach(candle => gapDetails.forEach((gap, gapTime) => {
            if (!gap.isFilled && candle.time > gapTime &&
                ((gap.dir === 'D' && candle.low <= gap.from) || (gap.dir === 'U' && candle.high >= gap.from)))
                gap.isFilled = true;
        }));
        candleSeries.setData(candles);
        refreshMarkers();
        chart.timeScale().fitContent();
        if (candles.length > 0) { currentCandle = { ...candles[candles.length - 1] }; lastCandleTime = currentCandle.time; }
        historyLoaded = true;
        setTimeout(() => chart.priceScale('right').applyOptions({ autoScale: true }), 50);
        loadSLStateLocal(sym);
        startSLPoll(sym);
        connectWebSocket(sym);
    }

    // ── Activate on click ─────────────────────────
    panelEl.addEventListener('mousedown', () => activatePanel(panel));

    // ── Resize ────────────────────────────────────
    function resize() {
        const w = chartAreaEl.offsetWidth;
        const h = chartAreaEl.offsetHeight;
        if (w > 0 && h > 0) chart.applyOptions({ width: w, height: h });
    }

    // ── Destroy ───────────────────────────────────
    function destroy() {
        stopSLPoll();
        if (socket) { socket._intentionalClose = true; socket.close(); }
        if (reconnectTimeout) clearTimeout(reconnectTimeout);
        chart.remove();
        panelEl.remove();
    }

    const panel = {
        id, el: panelEl,
        get symbol()         { return symbol; },
        get crosshairPrice() { return crosshairPrice; },
        get slPrice()        { return slPrice; },
        get slLineState()    { return slLineState; },
        get slOrderId()      { return slOrderId; },
        get chart()          { return chart; },
        loadSymbol: panelLoadSymbol,
        updateSLLine: updateSLLineLocal,
        resize, destroy,
    };
    return panel;
}

/* ======================
   PANEL MANAGEMENT
====================== */
function activatePanel(p) {
    if (activePanel === p) return;
    if (activePanel) activePanel.el.classList.remove('active');
    activePanel = p;
    p.el.classList.add('active');
    const sym = p.symbol;
    if (sym) {
        const display = Object.keys(strikeMap).find(k => strikeMap[k] === sym) || sym;
        document.getElementById('symbolSelect').value = display;
        resetOrderBar(sym);
    }
    updateSLBadge();
}

// Global bridges — delegate to activePanel
function loadSymbol(symbol) { if (activePanel) activePanel.loadSymbol(symbol); }
function updateSLLine(price, state) { if (activePanel) activePanel.updateSLLine(price, state); }

/* ======================
   LAYOUT MANAGEMENT
====================== */
function selectLayout(el) {
    document.querySelectorAll('.lp-option').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
    activeLayout = el.dataset.layout;
    document.getElementById('layoutPopup').style.display = 'none';

    // Sync the topbar button icon to the selected layout's SVG
    const optSvg = el.querySelector('svg');
    if (optSvg) {
        const btn = document.getElementById('layoutBtn');
        const clone = optSvg.cloneNode(true);
        clone.setAttribute('width', '18');
        clone.setAttribute('height', '14');
        btn.innerHTML = '';
        btn.appendChild(clone);
    }

    const prevSymbol = activePanel ? activePanel.symbol : null;
    panels.forEach(p => p.destroy());
    panels = [];
    activePanel = null;

    const cfg     = LAYOUT_CONFIGS[activeLayout];
    const grid    = document.getElementById('chartGrid');
    const topbarH = document.querySelector('.topbar').offsetHeight;
    grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${cfg.rows}, 1fr)`;
    grid.style.height = (window.innerHeight - topbarH) + 'px';

    const n = cfg.cols * cfg.rows;
    for (let i = 0; i < n; i++) panels.push(createPanel(i));

    activatePanel(panels[0]);

    requestAnimationFrame(() => {
        panels.forEach(p => p.resize());
        if (prevSymbol) panels[0].loadSymbol(prevSymbol);
    });
}

function toggleLayoutPopup(e) {
    if (e) e.stopPropagation();
    const p = document.getElementById('layoutPopup');
    if (p.style.display === 'block') { p.style.display = 'none'; return; }
    const btn  = document.getElementById('layoutBtn');
    const rect = btn.getBoundingClientRect();
    p.style.left = rect.left + 'px';
    p.style.top  = (rect.bottom + 4) + 'px';
    p.style.display = 'block';
}

document.addEventListener('click', (e) => {
    const p   = document.getElementById('layoutPopup');
    const btn = document.getElementById('layoutBtn');
    if (p && p.style.display === 'block' && !p.contains(e.target) && e.target !== btn && !btn.contains(e.target))
        p.style.display = 'none';
});

/* ======================
   STRIKE MAP & TOPBAR
====================== */
async function loadStrikes() {
    const [strikesRes, atmRes] = await Promise.all([fetch("/api/strikes"), fetch("/api/atm-symbol")]);
    const strikes = await strikesRes.json();
    const atm     = await atmRes.json();
    const dataList = document.getElementById("symbolList");
    dataList.innerHTML = "";
    strikeMap = {};
    strikes.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.display;
        dataList.appendChild(opt);
        strikeMap[item.display] = item.symbol;
    });
    if (strikes.length > 0) {
        const atmEntry     = atm.symbol ? strikes.find(s => s.symbol === atm.symbol) : null;
        const defaultEntry = atmEntry || strikes[0];
        document.getElementById("symbolSelect").value = defaultEntry.display;
        loadSymbol(defaultEntry.symbol);
    }
}

document.getElementById("symbolSelect").addEventListener("change", async function() {
    const displayValue = this.value;
    if (strikeMap[displayValue]) { loadSymbol(strikeMap[displayValue]); return; }
    const response = await fetch(`/api/resolve-symbol?display=${displayValue}`);
    const data     = await response.json();
    if (data.symbol) loadSymbol(data.symbol);
    else alert("Strike not found in DB");
});

});

/* ======================
   SL BADGE
====================== */
function updateSLBadge() {
    const badge = document.getElementById('slBadge');
    const slP = activePanel ? activePanel.slPrice : null;
    const slS = activePanel ? activePanel.slLineState : 'none';
    if (!slP || slS === 'none') { badge.textContent = 'SL: —'; badge.className = ''; return; }
    const labels = { pending: 'SET', placed: 'PLACED', hit: 'HIT' };
    badge.textContent = `SL ${slP} [${labels[slS] || slS}]`;
    badge.className   = slS;
}

/* ======================
   BUY / SELL ORDER BAR
====================== */
function getLotSize(symbol) {
    if (!symbol) return 65;
    if (symbol.startsWith('SENSEX'))    return LOT_SIZES.SENSEX;
    if (symbol.startsWith('BANKNIFTY')) return LOT_SIZES.BANKNIFTY;
    return LOT_SIZES.NIFTY;
}
function getIndexName(symbol) {
    if (!symbol) return 'NIFTY';
    if (symbol.startsWith('SENSEX'))    return 'SENSEX';
    if (symbol.startsWith('BANKNIFTY')) return 'BANKNIFTY';
    return 'NIFTY';
}
function setOrderType(type) {
    orderType = type;
    document.querySelectorAll('.ob-type-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.type === type));
}
function updateOrderBar(ltp) {
    if (ltp != null) currentLTP = ltp;
    const p   = currentLTP != null ? currentLTP.toFixed(2) : '—';
    const qty = orderLots * orderLotSize;
    document.getElementById('buyPrice').textContent  = p;
    document.getElementById('sellPrice').textContent = p;
    document.getElementById('buyQty').textContent    = `${qty} qty`;
    document.getElementById('sellQty').textContent   = `${qty} qty`;
    document.getElementById('calcQtyDisplay').textContent  = qty;
    document.getElementById('calcLotsDisplay').textContent = `${orderLots} lot${orderLots > 1 ? 's' : ''}`;
    const inp = document.getElementById('qtyDisplay');
    if (document.activeElement !== inp) inp.value = qty;
    document.getElementById('lotsDisplay').textContent = `${orderLots} lot${orderLots > 1 ? 's' : ''}`;
}
function resetOrderBar(symbol) {
    orderLotSize = getLotSize(symbol); orderLots = 1; currentLTP = null;
    document.getElementById('qtyPopupTitle').textContent = `Quantity (${getIndexName(symbol)} · ${orderLotSize}/lot)`;
    updateOrderBar(null);
}
function openSlConfig(anchorEl) {
    const popup = document.getElementById('slConfigPopup');
    document.getElementById('slBufInput').value  = slBuffer;
    document.getElementById('slDistInput').value = slDistance;
    const rect = anchorEl.closest('.ob-type-group').getBoundingClientRect();
    popup.style.left = rect.left + 'px';
    popup.style.top  = (rect.bottom + 6) + 'px';
    popup.style.display = 'block';
    document.getElementById('slBufInput').focus();
    document.getElementById('slBufInput').select();
}
function closeSlConfig() {
    const buf  = parseFloat(document.getElementById('slBufInput').value);
    const dist = parseFloat(document.getElementById('slDistInput').value);
    if (!isNaN(buf)  && buf  > 0) slBuffer   = buf;
    if (!isNaN(dist) && dist > 0) slDistance = dist;
    document.getElementById('slConfigPopup').style.display = 'none';
}
async function placeOrder(side) {
    if (!activePanel || !activePanel.symbol) { toast('No symbol selected', 'warn'); return; }
    const sym = activePanel.symbol;
    if (currentLTP == null) { toast('No LTP available yet', 'warn'); return; }
    const price = parseFloat(currentLTP.toFixed(2));
    const qty   = orderLots * orderLotSize;
    const label = `${side} ${qty} ${sym} @ ${price} [${orderType}]`;
    toast(`⏳ Placing ${label}…`, 'info', 2000);
    const res = await fetch('/api/place-limit-order', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ symbol: sym, price, side, qty, exchange: 'NFO', order_type: orderType, sl_buffer: slBuffer, sl_distance: slDistance }),
    });
    toastOrder(await res.json(), label);
}

/* ======================
   QTY POPUP
====================== */
function toggleQtyPopup(e) {
    if (e) e.stopPropagation();
    const p = document.getElementById('qtyPopup');
    if (p.style.display === 'block') { p.style.display = 'none'; return; }
    const bar  = document.getElementById('orderBar');
    const rect = bar.getBoundingClientRect();
    p.style.left = rect.left + 'px';
    p.style.top  = (rect.bottom + 6) + 'px';
    p.style.display = 'block';
    const inp = document.getElementById('qtyDisplay');
    inp.focus(); inp.select();
}
function adjustLots(delta) { orderLots = Math.max(1, orderLots + delta); updateOrderBar(null); }

(function () {
    let holdTimer = null, holdInterval = null;
    function startHold(delta, e) {
        e.stopPropagation(); adjustLots(delta);
        holdTimer = setTimeout(() => { holdInterval = setInterval(() => adjustLots(delta), 80); }, 400);
    }
    function stopHold(e) { if (e) e.stopPropagation(); clearTimeout(holdTimer); clearInterval(holdInterval); }
    ['mousedown','touchstart'].forEach(ev => {
        document.getElementById('btnPlus') .addEventListener(ev, e => startHold(+1, e), {passive:false});
        document.getElementById('btnMinus').addEventListener(ev, e => startHold(-1, e), {passive:false});
    });
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => {
        document.getElementById('btnPlus') .addEventListener(ev, stopHold);
        document.getElementById('btnMinus').addEventListener(ev, stopHold);
    });
})();

document.getElementById('qtyDisplay').addEventListener('change', e => {
    const typed = parseInt(e.target.value, 10);
    if (!isNaN(typed) && typed >= 1) { orderLots = Math.max(1, Math.round(typed / orderLotSize)); updateOrderBar(null); }
});
document.getElementById('qtyDisplay').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        e.preventDefault();
        const typed = parseInt(e.target.value, 10);
        if (!isNaN(typed) && typed >= 1) { orderLots = Math.max(1, Math.round(typed / orderLotSize)); updateOrderBar(null); }
        toggleQtyPopup();
    }
});
document.addEventListener('click', e => {
    const popup = document.getElementById('qtyPopup');
    const calc  = document.getElementById('btnCalc');
    if (popup.style.display === 'block' && !popup.contains(e.target) && !calc.contains(e.target))
        popup.style.display = 'none';
});

   DOM CONTENT LOADED
====================== */
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.ob-type-btn[data-type="SL"]').forEach(btn => {
        btn.addEventListener('dblclick', e => { e.stopPropagation(); openSlConfig(btn); });
    });
    ['slBufInput', 'slDistInput'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') closeSlConfig(); });
    });
    document.addEventListener('click', e => {
        const popup = document.getElementById('slConfigPopup');
        if (popup.style.display === 'block' && !popup.contains(e.target) && !e.target.closest('.ob-type-btn[data-type="SL"]'))
            closeSlConfig();
    });
});

/* ======================
   TOAST
====================== */
function toast(msg, type = 'info', duration = 4000) {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`; el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 420); }, duration);
}
function toastOrder(data, actionLabel) {
    if (!data) { toast(`${actionLabel}: no response`, 'error'); return; }
    if (data.status === 'success' || data.status === 'ok') {
        toast(`✅ ${actionLabel}${data.price ? ` @ ${data.price}` : ''}`, 'success');
    } else if (data.status === 'error') {
        toast(`❌ ${actionLabel} FAILED\n${data.message || ''}`, 'error', 6000);
    } else {
        toast(`⚠️ ${actionLabel}: ${JSON.stringify(data)}`, 'warn', 5000);
    }
}

/* ======================
   KEYBOARD SHORTCUTS
====================== */
window.addEventListener("keydown", async e => {
    if (document.activeElement.tagName === "INPUT") return;
    if (!activePanel || !activePanel.symbol) return;
    const key = e.key;
    const sym = activePanel.symbol;
    const cp  = activePanel.crosshairPrice;

    if (key === "q") {
        if (cp === null) { toast('Move mouse over chart first', 'warn'); return; }
        const price = Number(cp.toFixed(2));
        toast(`⏳ Placing SL BUY @ ${price}…`, 'info', 2000);
        const res = await fetch("/api/place-sl-order", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ symbol: sym, price, side: "BUY" }) });
        toastOrder(await res.json(), `SL BUY ${sym} @ ${price}`);
    }
    if (key === "w") {
        if (cp === null) { toast('Move mouse over chart first', 'warn'); return; }
        const price = Number(cp.toFixed(2));
        toast(`⏳ Placing SL SELL @ ${price}…`, 'info', 2000);
        const res = await fetch("/api/place-sl-order", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ symbol: sym, price, side: "SELL" }) });
        toastOrder(await res.json(), `SL SELL ${sym} @ ${price}`);
    }
    if (key === "l" || key === "L") {
        if (cp === null) { toast('Move mouse over chart first', 'warn'); return; }
        const price = Number(cp.toFixed(2));
        toast(`⏳ Converting SL → LIMIT @ ${price}…`, 'info', 2000);
        const res  = await fetch("/api/sl/convert-to-limit", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ symbol: sym, price }) });
        const data = await res.json();
        toastOrder(data, `SL→LIMIT @ ${price}`);
        if (data.status === "ok") activePanel.updateSLLine(price, 'placed');
    }
    if ((key === "s" || key === "S") && !e.shiftKey) {
        toast(`⏳ Converting SL → MARKET…`, 'info', 2000);
        const res = await fetch("/api/sl/convert-to-market", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ symbol: sym }) });
        toastOrder(await res.json(), `SL→MARKET ${sym}`);
    }
    if (key === "M" && e.shiftKey) {
        toast(`⏳ Closing full position for ${sym}…`, 'info', 3000);
        const res  = await fetch("/api/sl/close-position", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ symbol: sym }) });
        const data = await res.json();
        if (data.status === 'ok') {
            toast(`✅ Position closed\n${data.logs ? data.logs[data.logs.length - 1] : 'done'}`, 'success', 6000);
        } else { toast(`❌ Close position failed`, 'error', 6000); }
        activePanel.updateSLLine(null, 'none');
    }
});

/* ======================
   INITIALISE
====================== */
selectLayout(document.querySelector('.lp-option[data-layout="1"]'));
loadStrikes();
</script>
