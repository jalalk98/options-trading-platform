<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Option Chart</title>

    <script src="/lightweight-charts.standalone.production.js"></script>

    <style>

        #tooltip {
            position: absolute;
            display: none;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        html, body { margin: 0; height: 100%; overflow: hidden; font-family: Arial; }
        #chart { width: 100vw; }

        .topbar {
            padding: 10px;
            background: #f4f4f4;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            padding: 6px;
            width: 160px;
        }

        #goToLive {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 60px;
            z-index: 100;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        #goToLive:hover { background: #1d4ed8; }

        select {
            padding: 6px;
        }

        #currentSymbol {
            font-weight: bold;
            color: #2563eb;
        }

        #slBadge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: #333;
            color: #aaa;
            cursor: default;
            user-select: none;
            min-width: 90px;
            text-align: center;
        }
        #slBadge.pending  { background: #7c6000; color: #FFD700; }
        #slBadge.placed   { background: #7a3c00; color: #FF8C00; }
        #slBadge.hit      { background: #333;    color: #aaa;    }

        #chartLabel {
            position: absolute;
            top: 12px;
            right: 70px;       /* leave room for price axis */
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            opacity: 0.55;
            user-select: none;
        }
        #chartLabel .cl-index  { color: #6b7280; }
        #chartLabel .cl-strike { color: #b45309; }
        #chartLabel .cl-ce     { color: #15803d; }
        #chartLabel .cl-pe     { color: #b91c1c; }

        /* ── Buy / Sell buttons ── */
        #orderBar {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            align-items: stretch;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.45);
            font-family: Arial, sans-serif;
            user-select: none;
        }
        .ob-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 22px;
            cursor: pointer;
            border: none;
            min-width: 90px;
            gap: 2px;
            transition: filter 0.15s;
        }
        .ob-btn:hover { filter: brightness(1.15); }
        .ob-btn:active { filter: brightness(0.9); }
        .ob-buy  { background: #16a34a; color: #fff; }
        .ob-sell { background: #dc2626; color: #fff; }
        .ob-calc { background: #1e293b; color: #94a3b8; cursor: pointer; border: none; padding: 8px 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
        .ob-calc:hover { background: #334155; }
        .ob-label { font-size: 11px; font-weight: bold; letter-spacing: 0.5px; opacity: 0.85; }
        .ob-price { font-size: 15px; font-weight: bold; }
        .ob-qty   { font-size: 11px; opacity: 0.8; }
        .ob-lots  { font-size: 10px; opacity: 0.65; }

        /* ── Quantity calculator popup ── */
        #qtyPopup {
            display: none;
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            min-width: 220px;
            text-align: center;
        }
        #qtyPopup h4 { margin: 0 0 12px; font-size: 13px; color: #94a3b8; font-weight: normal; }
        .qty-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 6px; border: none; background: #334155; color: #e2e8f0; font-size: 18px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
        .qty-btn:hover { background: #475569; }
        #qtyDisplay { font-size: 22px; font-weight: bold; color: #f1f5f9; min-width: 60px; }
        #lotsDisplay { font-size: 12px; color: #64748b; margin-bottom: 4px; }
        #qtyClose { margin-top: 8px; background: #0f172a; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; padding: 5px 18px; cursor: pointer; font-size: 12px; }
        #qtyClose:hover { background: #1e293b; }

        /* ── Toast notifications ── */
        #toastContainer {
            position: fixed;
            top: 54px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
            opacity: 1;
            transition: opacity 0.4s ease;
            max-width: 320px;
            white-space: pre-wrap;
        }
        .toast.success { background: #15803d; border-left: 4px solid #4ade80; }
        .toast.error   { background: #b91c1c; border-left: 4px solid #f87171; }
        .toast.info    { background: #1d4ed8; border-left: 4px solid #93c5fd; }
        .toast.warn    { background: #92400e; border-left: 4px solid #fbbf24; }
    </style>
</head>
<body>

<div class="topbar">
    <span>Symbol:</span>
    <input list="symbolList" id="symbolSelect" placeholder="Search strike...">
    <datalist id="symbolList"></datalist>
    <span id="slBadge">SL: —</span>
</div>

<div style="position:relative;">
    <div id="chart"></div>
    <div id="chartLabel"></div>
</div>
<button id="goToLive">&#9654; Latest</button>
<div id="tooltip"></div>
<div id="toastContainer"></div>

<!-- Buy / Sell order bar -->
<div id="orderBar">
    <button class="ob-btn ob-buy" id="btnBuy" onclick="placeOrder('BUY')">
        <span class="ob-label">BUY</span>
        <span class="ob-price" id="buyPrice">—</span>
        <span class="ob-qty"   id="buyQty">65</span>
    </button>
    <button class="ob-calc" id="btnCalc" onclick="toggleQtyPopup()">
        <span class="ob-label">QTY</span>
        <span class="ob-qty"   id="calcQtyDisplay">65</span>
        <span class="ob-lots"  id="calcLotsDisplay">1 lot</span>
    </button>
    <button class="ob-btn ob-sell" id="btnSell" onclick="placeOrder('SELL')">
        <span class="ob-label">SELL</span>
        <span class="ob-price" id="sellPrice">—</span>
        <span class="ob-qty"   id="sellQty">65</span>
    </button>
</div>

<!-- Quantity calculator popup -->
<div id="qtyPopup">
    <h4 id="qtyPopupTitle">Quantity (NIFTY · 65/lot)</h4>
    <div id="lotsDisplay">1 lot</div>
    <div class="qty-row">
        <button class="qty-btn" onclick="adjustLots(-1)">−</button>
        <span id="qtyDisplay">65</span>
        <button class="qty-btn" onclick="adjustLots(+1)">+</button>
    </div>
    <button id="qtyClose" onclick="toggleQtyPopup()">Done</button>
</div>

<script>
/* ======================
   CHART SETUP
====================== */
function getChartHeight() {
    return window.innerHeight - document.querySelector('.topbar').offsetHeight;
}

const chart = LightweightCharts.createChart(
    document.getElementById('chart'),
    {
        width: window.innerWidth,
        height: getChartHeight(),
        timeScale: {
            timeVisible: true,
            secondsVisible: true,

            rightOffset: 40,

            // Axis labels (bottom scale)
            tickMarkFormatter: (time) => {
                const date = new Date(time * 1000);
                return date.toLocaleTimeString('en-IN', {
                    timeZone: 'Asia/Kolkata',
                    hour12: false,
                });
            }
        },

        rightPriceScale: {
            autoScale: true,
            scaleMargins: {
                top: 0.2,
                bottom: 0.2,
         },
        },

            // 🔥 Crosshair label formatter
            localization: {
                locale: 'en-IN',

                timeFormatter: (time) => {
                    const date = new Date(time * 1000);
                    return date.toLocaleString('en-IN', {
                        timeZone: 'Asia/Kolkata',
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false,
                    });
                }
            },

        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal
        }
    }
);

const tooltip = document.getElementById('tooltip');

chart.subscribeCrosshairMove(param => {

    if (!param.point) return;

    // 🔥 Convert mouse Y position to price
    const price = candleSeries.coordinateToPrice(param.point.y);

    if (price !== null) {
        crosshairPrice = price;
    }

    if (!param.time || !param.point || !gapDetails.has(param.time)) {
        tooltip.style.display = 'none';
        return;
    }

    const g = gapDetails.get(param.time);

    tooltip.innerHTML = `
        <b>Gap ${g.dir}</b><br/>
        From: ${g.from}<br/>
        To: ${g.to}<br/>
        Jump: ${g.jump}<br/>
        Range: ${g.rangeLow} → ${g.rangeHigh}<br/>
        <b>Volume:</b> ${g.volume}
    `;

    tooltip.style.left = param.point.x + 15 + 'px';
    tooltip.style.top = param.point.y + 15 + 'px';
    tooltip.style.display = 'block';
});

const candleSeries = chart.addBarSeries({
    upColor: '#22c55e',
    downColor: '#ef4444',
    thinBars: true,
});

/* ======================
   GLOBALS
====================== */
const INTERVAL = 5;
let currentCandle = null;
let socket = null;
let reconnectTimeout = null;
let activeSymbol = null;
let gapDetails = new Map();   // time → gap metadata
let crosshairPrice = null;
let historyLoaded = false;
let lastCandleTime = null;

/* ======================
   BUCKET FUNCTION
====================== */
function getBucketTime(epochSeconds) {
    return Math.floor(epochSeconds / INTERVAL) * INTERVAL;
}

function updateChartLabel(symbol) {
    const el = document.getElementById('chartLabel');
    if (!el) return;

    // Parse index name from symbol prefix
    let index = 'NIFTY';
    if (symbol.startsWith('SENSEX'))    index = 'SENSEX';
    else if (symbol.startsWith('BANKNIFTY')) index = 'BANKNIFTY';

    // Get strike + type from strikeMap display e.g. "2026-03-17 | 24200 CE"
    const display = Object.keys(strikeMap).find(k => strikeMap[k] === symbol);
    if (!display) { el.innerHTML = ''; return; }

    const part = display.split('|')[1]?.trim() || '';
    const [strike, type] = part.split(' ');
    if (!strike || !type) { el.innerHTML = ''; return; }

    const typeClass = type === 'CE' ? 'cl-ce' : 'cl-pe';
    el.innerHTML = `
        <span class="cl-index">${index}</span>
        <span class="cl-index">·</span>
        <span class="cl-strike">${strike}</span>
        <span class="cl-index">·</span>
        <span class="${typeClass}">${type}</span>
    `;
}

async function loadSymbol(symbol) {

    if (!symbol) return;

    historyLoaded = false;
    activeSymbol = symbol;
    updateChartLabel(symbol);
    resetOrderBar(symbol);

    if (socket) {
        socket.close();
        socket = null;
    }

    if (reconnectTimeout) {
        clearTimeout(reconnectTimeout);
        reconnectTimeout = null;
    }

    candleSeries.setData([]);
    currentCandle = null;
    gapDetails.clear();
    lastCandleTime = null;
    stopSLPoll();

    // 🔹 Load history + gaps in parallel
    const [historyRes, gapsRes] = await Promise.all([
        fetch(`/api/history/${symbol}`),
        fetch(`/api/gaps/${symbol}`)
    ]);
    const history = await historyRes.json();
    const gapsRaw = await gapsRes.json();

    const candles = history.map(c => ({
        time:  c.time - 19800,   // convert IST epoch → UTC epoch for chart
        open:  c.open,
        high:  c.high,
        low:   c.low,
        close: c.close
    }));

    lastCandleTime = candles.length ? candles[candles.length - 1].time : null;

    // 🔹 Build gapDetails from historical gap rows
    gapsRaw.forEach(g => {
        const bucketTime = g.time - 19800;
        const dir = g.direction === 'UP' ? 'D' : 'U';
        gapDetails.set(bucketTime, {
            dir,
            from:      g.prev_price,
            to:        g.curr_price,
            jump:      Math.abs(g.curr_price - g.prev_price).toFixed(2),
            rangeLow:  Math.min(g.prev_price, g.curr_price),
            rangeHigh: Math.max(g.prev_price, g.curr_price),
            volume:    g.vol_change || 0,
            isFilled:  false
        });
    });

    // 🔹 Detect which historical gaps were already filled by later candles
    candles.forEach(candle => {
        gapDetails.forEach((gap, gapTime) => {
            if (!gap.isFilled && candle.time > gapTime) {
                if ((gap.dir === 'D' && candle.low  <= gap.from) ||
                    (gap.dir === 'U' && candle.high >= gap.from)) {
                    gap.isFilled = true;
                }
            }
        });
    });

    candleSeries.setData(candles);
    refreshMarkers();
    chart.timeScale().fitContent();

    if (candles.length > 0) {
        currentCandle = { ...candles[candles.length - 1] };
        lastCandleTime = currentCandle.time;
    }

    historyLoaded = true;

    setTimeout(() => {
        chart.priceScale('right').applyOptions({ autoScale: true });
    }, 50);

    // Load SL state and start polling for this symbol
    await loadSLState(symbol);
    startSLPoll(symbol);

    // 🔹 Connect WebSocket AFTER history loads
    connectWebSocket(symbol);
}



function refreshMarkers() {

    candleSeries.setMarkers(
        Array.from(gapDetails.entries()).map(([time, info]) => ({

            time,
            position: info.dir === 'D' ? 'aboveBar' : 'belowBar',

            color: info.isFilled
                ? (info.dir === 'D'
                    ? 'rgba(0,128,0,0.3)'
                    : 'rgba(255,0,0,0.3)')
                : (info.dir === 'D'
                    ? 'green'
                    : 'red'),

            shape: 'text',
            text: info.dir
        }))
    );
}

function checkGapFill(currentCandle) {

    let updated = false;

    gapDetails.forEach((gap, time) => {

        if (!gap.isFilled) {

            // U gap → price must return to FROM or below
            if (
                (gap.dir === 'D' && currentCandle.low <= gap.from) ||

                // D gap → price must return to FROM or above
                (gap.dir === 'U' && currentCandle.high >= gap.from)
            ) {
                gap.isFilled = true;
                updated = true;
            }
        }
    });

    if (updated) {
        refreshMarkers();
    }
}

/* ======================
   CONNECT WS
====================== */
function connectWebSocket(symbol) {

    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    socket = new WebSocket(`${wsProtocol}//${window.location.host}/ws/${symbol}`);

    socket.onopen = () => {
        console.log("Connected:", symbol);
    };

    socket.onmessage = function(event) {
        
        
        if (!historyLoaded) return;
        //console.log("WS TICK:", event.data);
        if (!activeSymbol) return;

        const tick = JSON.parse(event.data);
        console.log(tick);

        // Ignore ticks for previous symbol
        if (tick.symbol && tick.symbol !== activeSymbol) {
            return;
        }

        const bucketTime = getBucketTime(Math.floor(Number(tick.time)));
        const price = tick.value;

        // 🔴 Prevent backward time updates
        if (lastCandleTime !== null && bucketTime < lastCandleTime) {
            console.log("Ignoring old tick:", bucketTime, " < ", lastCandleTime);
            return;
        }
        
        if (tick.is_gap) {

            const dir = tick.direction === "UP" ? "D" : "U";
            const prevPrice = tick.prev_price;

            gapDetails.set(bucketTime, {
                dir,
                from: prevPrice,
                to: price,
                jump: Math.abs(price - prevPrice).toFixed(2),
                rangeLow: Math.min(prevPrice, price),
                rangeHigh: Math.max(prevPrice, price),
                volume: tick.vol_change || 0,
                isFilled: false
            });

            candleSeries.setMarkers(
                Array.from(gapDetails.entries()).map(([time, info]) => ({
                    time,
                    position: info.dir === 'D' ? 'aboveBar' : 'belowBar',
                    color: info.dir === 'D' ? 'green' : 'red',
                    shape: 'text',
                    text: info.dir
                }))
            );
        }

        // NEW candle if tick is in a new time bucket
        if (!currentCandle || bucketTime > currentCandle.time) {

            currentCandle = {
                time: bucketTime,
                open: price,
                high: price,
                low: price,
                close: price
            };

        }

        // Update existing candle
        else if (bucketTime === currentCandle.time) {

            currentCandle.high = Math.max(currentCandle.high, price);
            currentCandle.low = Math.min(currentCandle.low, price);
            currentCandle.close = price;

        }

        // Ignore old ticks
        else {
            console.log("Ignoring delayed tick:", bucketTime);
            return;
        }

        updateOrderBar(price);

        if (
            currentCandle &&
            !isNaN(currentCandle.open) &&
            !isNaN(currentCandle.high) &&
            !isNaN(currentCandle.low) &&
            !isNaN(currentCandle.close)
        ) {
            candleSeries.update(currentCandle);
        }

        checkGapFill(currentCandle);
        // chart.timeScale().scrollToRealTime();
    };

    socket.onclose = (event) => {

    if (!activeSymbol) return;

    console.log("Socket closed. Reconnecting in 3s...");

    reconnectTimeout = setTimeout(() => {
        connectWebSocket(activeSymbol);
    }, 3000);
    };

    socket.onerror = (err) => {
        console.error("Socket error", err);
        socket.close();
    };
}

/* ======================
   ENTER KEY SUPPORT
====================== */
document.getElementById("symbolSelect")
.addEventListener("change", async function() {

    const displayValue = this.value;

    if (strikeMap[displayValue]) {
        loadSymbol(strikeMap[displayValue]);
        return;
    }

    // If manually typed, resolve from backend
    const response = await fetch(`/api/resolve-symbol?display=${displayValue}`);
    const data = await response.json();

    if (data.symbol) {
        loadSymbol(data.symbol);
    } else {
        alert("Strike not found in DB");
    }
});



let strikeMap = {};  // display → symbol mapping

async function loadStrikes() {
    const [strikesRes, atmRes] = await Promise.all([
        fetch("/api/strikes"),
        fetch("/api/atm-symbol")
    ]);
    const strikes = await strikesRes.json();
    const atm     = await atmRes.json();

    const dataList = document.getElementById("symbolList");
    dataList.innerHTML = "";
    strikeMap = {};

    strikes.forEach(item => {
        const option = document.createElement("option");
        option.value = item.display;
        dataList.appendChild(option);
        strikeMap[item.display] = item.symbol;
    });

    if (strikes.length > 0) {
        const atmEntry = atm.symbol ? strikes.find(s => s.symbol === atm.symbol) : null;
        const defaultEntry = atmEntry || strikes[0];
        document.getElementById("symbolSelect").value = defaultEntry.display;
        loadSymbol(defaultEntry.symbol);
    }
}


loadStrikes();


/* ======================
   RESPONSIVE
====================== */
window.addEventListener('resize', () => {
    chart.applyOptions({ width: window.innerWidth, height: getChartHeight() });
});

/* ======================
   GO TO LATEST BUTTON
====================== */
const goToLiveBtn = document.getElementById('goToLive');

chart.timeScale().subscribeVisibleTimeRangeChange((range) => {
    if (!range || !lastCandleTime) { goToLiveBtn.style.display = 'none'; return; }
    goToLiveBtn.style.display = lastCandleTime > range.to ? 'flex' : 'none';
});

goToLiveBtn.addEventListener('click', () => {
    chart.timeScale().scrollToRealTime();
});


/* ======================
   SL LINE
====================== */
// Colors per state
const SL_COLOR = {
    pending: '#FFD700',   // gold   — set, not yet placed
    placed:  '#FF8C00',   // orange — order active on Kite
    hit:     '#808080',   // gray   — order executed
};

let slPriceLine  = null;   // LightweightCharts price line
let slPrice      = null;   // current SL price
let slLineState  = 'none'; // 'none' | 'pending' | 'placed' | 'hit'
let slOrderId    = null;
let slDragging   = false;
let slPollTimer  = null;

function updateSLLine(price, state) {
    if (slPriceLine) {
        candleSeries.removePriceLine(slPriceLine);
        slPriceLine = null;
    }
    if (price == null || state === 'none') {
        slPrice     = null;
        slLineState = 'none';
        updateSLBadge();
        return;
    }
    slPrice     = price;
    slLineState = state;
    const color = SL_COLOR[state] || SL_COLOR.pending;
    slPriceLine = candleSeries.createPriceLine({
        price:             price,
        color:             color,
        lineWidth:         2,
        lineStyle:         2,   // dashed
        axisLabelVisible:  true,
        title:             `SL ${price}`,
    });
    updateSLBadge();
}

function updateSLBadge() {
    const badge = document.getElementById('slBadge');
    if (!slPrice || slLineState === 'none') {
        badge.textContent = 'SL: —';
        badge.className   = '';
        return;
    }
    const labels = { pending: 'SET', placed: 'PLACED', hit: 'HIT' };
    badge.textContent = `SL ${slPrice} [${labels[slLineState] || slLineState}]`;
    badge.className   = slLineState;
}

// Poll backend every 2s to detect state changes (placed → hit)
function startSLPoll(symbol) {
    stopSLPoll();
    slPollTimer = setInterval(async () => {
        if (!symbol) return;
        const res  = await fetch(`/api/sl/${symbol}`);
        const data = await res.json();
        if (data.state && data.state !== 'none') {
            const price = data.price || slPrice;
            if (data.state !== slLineState || price !== slPrice) {
                updateSLLine(price, data.state);
                slOrderId = data.order_id || null;
            }
            // After SL is hit, reset to pending with no order_id
            if (data.state === 'hit') {
                setTimeout(() => updateSLLine(price, 'pending'), 2000);
            }
        }
    }, 2000);
}

function stopSLPoll() {
    if (slPollTimer) { clearInterval(slPollTimer); slPollTimer = null; }
}

// Fetch SL state when switching symbols
async function loadSLState(symbol) {
    updateSLLine(null, 'none');
    slOrderId = null;
    try {
        const res  = await fetch(`/api/sl/${symbol}`);
        const data = await res.json();
        if (data.state && data.state !== 'none' && data.price) {
            updateSLLine(data.price, data.state);
            slOrderId = data.order_id || null;
        }
    } catch (_) {}
}

/* ── Drag logic ─────────────────────────────── */
const chartDiv = document.getElementById('chart');

function isNearSLLine(clientY) {
    if (!slPrice) return false;
    const rect = chartDiv.getBoundingClientRect();
    const y    = clientY - rect.top;
    const slY  = candleSeries.priceToCoordinate(slPrice);
    return slY !== null && Math.abs(y - slY) < 8;
}

function disableChartScroll() {
    chart.applyOptions({ handleScroll: { mouseWheel: true, pressedMouseMove: false, horzTouchDrag: false, vertTouchDrag: false } });
}
function enableChartScroll() {
    chart.applyOptions({ handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: true } });
}

chartDiv.addEventListener('mousemove', (e) => {
    if (!slPrice) return;
    const rect = chartDiv.getBoundingClientRect();
    const y    = e.clientY - rect.top;

    if (isNearSLLine(e.clientY)) {
        chartDiv.style.cursor = 'ns-resize';
        disableChartScroll();   // prevent chart panning when hovering the line
    } else if (!slDragging) {
        chartDiv.style.cursor = 'default';
        enableChartScroll();
    }

    if (slDragging) {
        const newPrice = candleSeries.coordinateToPrice(y);
        if (newPrice !== null) {
            const p = Math.round(newPrice * 20) / 20;   // round to 0.05
            updateSLLine(p, slLineState === 'none' ? 'pending' : slLineState);
        }
    }
});

chartDiv.addEventListener('mousedown', (e) => {
    if (!slPrice) return;
    if (isNearSLLine(e.clientY)) {
        slDragging = true;
        disableChartScroll();
        e.stopPropagation();   // prevent chart receiving this mousedown
    }
});

chartDiv.addEventListener('mouseup', async () => {
    if (!slDragging) return;
    slDragging             = false;
    chartDiv.style.cursor  = 'default';
    enableChartScroll();
    if (!slPrice || !activeSymbol) return;
    // Persist new price to backend (will also modify Kite order if placed)
    await fetch('/api/sl/set', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ symbol: activeSymbol, price: slPrice }),
    });
});

// Double-click on chart → place SL line at that price (if no line yet)
chartDiv.addEventListener('dblclick', async (e) => {
    if (!activeSymbol || crosshairPrice === null) return;
    const p = Math.round(crosshairPrice * 20) / 20;
    updateSLLine(p, 'pending');
    await fetch('/api/sl/set', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ symbol: activeSymbol, price: p }),
    });
});

/* ======================
   BUY / SELL ORDER BAR
====================== */
const LOT_SIZES = { NIFTY: 65, SENSEX: 20, BANKNIFTY: 30 };

let currentLTP  = null;
let orderLots   = 1;
let orderLotSize = 65;   // updated on symbol change

function getLotSize(symbol) {
    if (!symbol) return 65;
    if (symbol.startsWith('SENSEX'))    return LOT_SIZES.SENSEX;
    if (symbol.startsWith('BANKNIFTY')) return LOT_SIZES.BANKNIFTY;
    return LOT_SIZES.NIFTY;
}

function getIndexName(symbol) {
    if (!symbol) return 'NIFTY';
    if (symbol.startsWith('SENSEX'))    return 'SENSEX';
    if (symbol.startsWith('BANKNIFTY')) return 'BANKNIFTY';
    return 'NIFTY';
}

function updateOrderBar(ltp) {
    if (ltp != null) currentLTP = ltp;
    const p   = currentLTP != null ? currentLTP.toFixed(2) : '—';
    const qty = orderLots * orderLotSize;
    document.getElementById('buyPrice').textContent  = p;
    document.getElementById('sellPrice').textContent = p;
    document.getElementById('buyQty').textContent    = `${qty} qty`;
    document.getElementById('sellQty').textContent   = `${qty} qty`;
    document.getElementById('calcQtyDisplay').textContent = qty;
    document.getElementById('calcLotsDisplay').textContent =
        `${orderLots} lot${orderLots > 1 ? 's' : ''}`;
}

function resetOrderBar(symbol) {
    orderLotSize = getLotSize(symbol);
    orderLots    = 1;
    currentLTP   = null;
    const idx    = getIndexName(symbol);
    document.getElementById('qtyPopupTitle').textContent =
        `Quantity (${idx} · ${orderLotSize}/lot)`;
    updateOrderBar(null);
}

function adjustLots(delta) {
    orderLots = Math.max(1, orderLots + delta);
    updateOrderBar(null);
}

function toggleQtyPopup() {
    const p = document.getElementById('qtyPopup');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

// Close popup when clicking outside
document.addEventListener('click', (e) => {
    const popup = document.getElementById('qtyPopup');
    const calc  = document.getElementById('btnCalc');
    if (popup.style.display === 'block' &&
        !popup.contains(e.target) && e.target !== calc) {
        popup.style.display = 'none';
    }
});

async function placeOrder(side) {
    if (!activeSymbol) { toast('No symbol selected', 'warn'); return; }
    if (currentLTP == null) { toast('No LTP available yet', 'warn'); return; }

    const price = parseFloat(currentLTP.toFixed(2));
    const qty   = orderLots * orderLotSize;
    const label = `${side} ${qty} ${activeSymbol} @ ${price}`;

    toast(`⏳ Placing ${label}…`, 'info', 2000);

    const res  = await fetch('/api/place-limit-order', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ symbol: activeSymbol, price, side, qty, exchange: 'NFO' }),
    });
    toastOrder(await res.json(), label);
}

/* ======================
   TOAST NOTIFICATIONS
====================== */
function toast(msg, type = 'info', duration = 4000) {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 420);
    }, duration);
}

function toastOrder(data, actionLabel) {
    if (!data) { toast(`${actionLabel}: no response`, 'error'); return; }
    if (data.status === 'success' || data.status === 'ok') {
        const detail = data.price ? ` @ ${data.price}` : '';
        toast(`✅ ${actionLabel}${detail}`, 'success');
    } else if (data.status === 'error') {
        toast(`❌ ${actionLabel} FAILED\n${data.message || ''}`, 'error', 6000);
    } else {
        toast(`⚠️ ${actionLabel}: ${JSON.stringify(data)}`, 'warn', 5000);
    }
}

/* ======================
   KEYBOARD SHORTCUTS
====================== */
window.addEventListener("keydown", async (e) => {

    if (document.activeElement.tagName === "INPUT") return;

    const key = e.key;
    if (!activeSymbol) return;

    // ── Q: SL BUY ───────────────────────────
    if (key === "q") {
        if (crosshairPrice === null) { toast('Move mouse over chart first', 'warn'); return; }
        const price = Number(crosshairPrice.toFixed(2));
        toast(`⏳ Placing SL BUY @ ${price}…`, 'info', 2000);
        const res  = await fetch("/api/place-sl-order", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ symbol: activeSymbol, price, side: "BUY" })
        });
        toastOrder(await res.json(), `SL BUY ${activeSymbol} @ ${price}`);
    }

    // ── W: SL SELL ──────────────────────────
    if (key === "w") {
        if (crosshairPrice === null) { toast('Move mouse over chart first', 'warn'); return; }
        const price = Number(crosshairPrice.toFixed(2));
        toast(`⏳ Placing SL SELL @ ${price}…`, 'info', 2000);
        const res  = await fetch("/api/place-sl-order", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ symbol: activeSymbol, price, side: "SELL" })
        });
        toastOrder(await res.json(), `SL SELL ${activeSymbol} @ ${price}`);
    }

    // ── L: Convert SL → LIMIT at crosshair ─
    if (key === "l" || key === "L") {
        if (crosshairPrice === null) { toast('Move mouse over chart first', 'warn'); return; }
        const price = Number(crosshairPrice.toFixed(2));
        toast(`⏳ Converting SL → LIMIT @ ${price}…`, 'info', 2000);
        const res  = await fetch("/api/sl/convert-to-limit", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ symbol: activeSymbol, price })
        });
        const data = await res.json();
        toastOrder(data, `SL→LIMIT @ ${price}`);
        if (data.status === "ok") updateSLLine(price, 'placed');
    }

    // ── S: Convert SL → MARKET ──────────────
    if ((key === "s" || key === "S") && !e.shiftKey) {
        toast(`⏳ Converting SL → MARKET…`, 'info', 2000);
        const res  = await fetch("/api/sl/convert-to-market", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ symbol: activeSymbol })
        });
        toastOrder(await res.json(), `SL→MARKET ${activeSymbol}`);
    }

    // ── Shift+M: Close full position ────────
    if (key === "M" && e.shiftKey) {
        toast(`⏳ Closing full position for ${activeSymbol}…`, 'info', 3000);
        const res  = await fetch("/api/sl/close-position", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ symbol: activeSymbol })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            const summary = data.logs ? data.logs[data.logs.length - 1] : 'done';
            toast(`✅ Position closed\n${summary}`, 'success', 6000);
        } else {
            toast(`❌ Close position failed`, 'error', 6000);
        }
        updateSLLine(null, 'none');
    }

});


</script>
