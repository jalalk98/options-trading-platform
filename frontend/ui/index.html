<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Option Chart</title>

    <script src="/lightweight-charts.standalone.production.js"></script>

    <style>

        #tooltip {
            position: fixed;
            display: none;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        html, body { margin: 0; height: 100%; overflow: hidden; font-family: Arial; }

        .topbar {
            padding: 6px 10px;
            background: #f4f4f4;
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 10px;
        }

        input {
            padding: 4px;
            width: 104px;
            font-size: 10px;
        }

        #goToLive {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 60px;
            z-index: 100;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        #goToLive:hover { background: #1d4ed8; }

        #maximizeBtn {
            display: flex;
            position: fixed;
            bottom: 24px;
            right: 16px;
            z-index: 100;
            background: #0f172a;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            padding: 0;
        }
        #maximizeBtn:hover { background: #1e3a5f; border-color: #60a5fa; }

        select {
            padding: 6px;
        }

        #currentSymbol {
            font-weight: bold;
            color: #2563eb;
        }

        #slBadge {
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            background: #333;
            color: #aaa;
            cursor: default;
            user-select: none;
            min-width: 90px;
            text-align: center;
        }
        #slBadge.pending  { background: #06b6d4; color: #fff; }
        #slBadge.placed   { background: #fb923c; color: #fff; }
        #slBadge.hit      { background: #6b7280; color: #fff; }

        #slContextMenu {
            display: none;
            position: fixed;
            z-index: 2000;
            background: #1e2330;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 10px 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            font-size: 11px;
            color: #e5e7eb;
            min-width: 180px;
        }
        #slContextMenu .sl-cm-title {
            font-weight: bold;
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #slContextMenu label {
            display: block;
            margin-bottom: 3px;
            color: #9ca3af;
            font-size: 10px;
        }
        #slContextMenu input[type=number] {
            width: 100%;
            box-sizing: border-box;
            background: #111827;
            border: 1px solid #374151;
            color: #f9fafb;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        #slContextMenu input[type=number]:focus { outline: none; border-color: #06b6d4; }
        .sl-cm-btns { display: flex; gap: 6px; justify-content: flex-end; }
        .sl-cm-btns button {
            padding: 4px 10px;
            border-radius: 4px;
            border: none;
            font-size: 11px;
            cursor: pointer;
        }
        #slCmCancel  { background: #374151; color: #e5e7eb; }
        #slCmConfirm { background: #06b6d4; color: #fff; font-weight: bold; }

        #chartLabel {
            position: absolute;
            top: 12px;
            right: 70px;       /* leave room for price axis */
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            opacity: 0.55;
            user-select: none;
        }
        #chartLabel .cl-index  { color: #6b7280; }
        #chartLabel .cl-strike { color: #b45309; }
        #chartLabel .cl-ce     { color: #15803d; }
        #chartLabel .cl-pe     { color: #b91c1c; }

        /* ── Buy / Sell buttons ── */
        #orderBar {
            position: fixed;
            top: 42px; /* updated dynamically via updateLayout() */
            left: 12px;
            z-index: 200;
            display: flex;
            align-items: stretch;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.45);
            font-family: Arial, sans-serif;
            user-select: none;
        }
        .ob-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 11px;
            cursor: pointer;
            border: none;
            min-width: 46px;
            gap: 1px;
            transition: filter 0.15s;
        }
        .ob-btn:hover { filter: brightness(1.15); }
        .ob-btn:active { filter: brightness(0.9); }
        .ob-buy  { background: #16a34a; color: #fff; }
        .ob-sell { background: #dc2626; color: #fff; }
        .ob-calc { background: #1e293b; color: #94a3b8; cursor: pointer; border: none; padding: 4px 7px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; }
        .ob-calc:hover { background: #334155; }
        .ob-label { font-size: 9px; font-weight: bold; letter-spacing: 0.5px; opacity: 0.85; }
        .ob-price { font-size: 11px; font-weight: bold; }
        .ob-qty   { font-size: 9px; opacity: 0.8; }
        .ob-lots  { font-size: 8px; opacity: 0.65; }
        /* ── Order-type toggle group ── */
        .ob-type-group {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            background: #0f172a;
        }
        .ob-type-btn {
            flex: 1;
            border: none;
            cursor: pointer;
            font-size: 8px;
            font-weight: bold;
            letter-spacing: 0.4px;
            padding: 0 7px;
            color: #64748b;
            background: transparent;
            transition: background 0.12s, color 0.12s;
            white-space: nowrap;
        }
        .ob-type-btn:hover { background: #1e293b; color: #94a3b8; }
        .ob-type-btn.active { background: #334155; color: #f1f5f9; }

        /* ── Quantity calculator popup ── */
        #qtyPopup {
            display: none;
            position: fixed;
            z-index: 300;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 7px;
            padding: 8px 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.6);
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            min-width: 140px;
            text-align: center;
        }
        #qtyPopup h4 { margin: 0 0 6px; font-size: 10px; color: #94a3b8; font-weight: normal; }
        .qty-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .qty-btn { width: 22px; height: 22px; border-radius: 4px; border: none; background: #334155; color: #e2e8f0; font-size: 14px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
        .qty-btn:hover { background: #475569; }
        #qtyDisplay { font-size: 13px; font-weight: bold; color: #f1f5f9; width: 48px; background: #0f172a; border: 1px solid #475569; border-radius: 4px; text-align: center; padding: 3px 4px; appearance: textfield; -moz-appearance: textfield; }
        #qtyDisplay::-webkit-inner-spin-button, #qtyDisplay::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; }
        #lotsDisplay { font-size: 10px; color: #64748b; margin-bottom: 3px; }
        #qtyClose { margin-top: 5px; background: #0f172a; border: 1px solid #334155; color: #94a3b8; border-radius: 4px; padding: 3px 12px; cursor: pointer; font-size: 10px; }
        #qtyClose:hover { background: #1e293b; }

        /* ── SL config popup ── */
        #slConfigPopup {
            display: none;
            position: fixed;
            z-index: 300;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 7px;
            padding: 10px 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.6);
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            min-width: 170px;
        }
        #slConfigPopup h4 { margin: 0 0 8px; font-size: 10px; color: #94a3b8; font-weight: normal; letter-spacing: 0.4px; }
        .slcfg-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
        .slcfg-row label { font-size: 9px; color: #94a3b8; white-space: nowrap; }
        .slcfg-input {
            width: 56px; font-size: 11px; font-weight: bold; color: #f1f5f9;
            background: #0f172a; border: 1px solid #475569; border-radius: 4px;
            text-align: center; padding: 3px 4px;
            appearance: textfield; -moz-appearance: textfield;
        }
        .slcfg-input::-webkit-inner-spin-button,
        .slcfg-input::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; }
        #slConfigClose { margin-top: 8px; width: 100%; background: #0f172a; border: 1px solid #334155; color: #94a3b8; border-radius: 4px; padding: 3px 0; cursor: pointer; font-size: 10px; }
        #slConfigClose:hover { background: #1e293b; }
        .slcfg-divider { border: none; border-top: 1px solid #334155; margin: 7px 0; }
        .slcfg-check {
            display: flex; align-items: center; gap: 7px;
            margin-bottom: 5px; cursor: pointer;
            font-size: 9px; color: #94a3b8; user-select: none;
        }
        .slcfg-check input[type=checkbox] {
            width: 12px; height: 12px; accent-color: #38bdf8; cursor: pointer; margin: 0;
        }

        /* ── Historical mode bar ── */
        #histBar {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: #fef3c7;
            border-bottom: 2px solid #fcd34d;
            font-size: 11px;
            flex-shrink: 0;
        }
        #histBar.active { display: flex; }
        #histBar .hist-label { color: #92400e; font-weight: 700; margin-right: 4px; }
        #histDatePicker {
            font-size: 11px; padding: 2px 5px;
            border: 1px solid #d97706; border-radius: 4px; background: #fff; cursor: pointer;
        }
        #histSymbolPicker {
            font-size: 11px; padding: 2px 5px;
            border: 1px solid #d97706; border-radius: 4px; background: #fff;
            min-width: 190px; cursor: pointer;
        }
        #histNoData { color: #b45309; font-size: 10px; }
        #histClearBtn {
            font-size: 11px; padding: 2px 9px;
            background: #d97706; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-left: 4px;
        }
        #histClearBtn:hover { background: #b45309; }
        #histBtn, #syncBtn, #savedLayoutsBtn {
            background: none; border: 1px solid #ccc; border-radius: 4px;
            cursor: pointer; padding: 2px 5px; display: flex; align-items: center;
            justify-content: center; color: #555; height: 22px; font-size: 13px;
        }
        #histBtn:hover, #syncBtn:hover, #savedLayoutsBtn:hover { background: #e4e4e4; }
        #histBtn.active { background: #fef3c7; border-color: #d97706; color: #d97706; }
        #syncBtn.active { background: #dbeafe; border-color: #3b82f6; color: #2563eb; }

        /* ── Layout picker ── */
        #layoutBtn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            height: 22px;
        }
        #layoutBtn:hover { background: #e4e4e4; }
        #layoutBtn svg { display: block; }

        #indexTicker {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 11px;
            margin: 0 6px;
        }
        .idx-group {
            position: relative;
        }
        .idx-chip {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 4px;
            user-select: none;
        }
        .idx-chip:hover { background: #f0f0f0; }
        .idx-label {
            font-size: 10px;
            color: #555;
            font-weight: 700;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        .idx-price {
            font-size: 11px;
            font-weight: 700;
            color: #222;
        }
        .idx-change {
            font-size: 10px;
            font-weight: 500;
            color: #888;
            white-space: nowrap;
        }
        .idx-price.up, .idx-change.up   { color: #16a34a; }
        .idx-price.down, .idx-change.down { color: #dc2626; }
        .idx-menu {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            z-index: 2000;
            min-width: 100px;
            overflow: hidden;
        }
        .idx-menu.open { display: block; }
        .idx-menu-item {
            padding: 5px 12px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            color: #333;
        }
        .idx-menu-item:hover { background: #f5f5f5; }
        .idx-menu-item.active { font-weight: 700; color: #1d4ed8; }

        #topbarRight {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #autoPopulateSelect {
            font-size: 10px;
            padding: 2px 4px;
            height: 22px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #333;
            cursor: pointer;
        }
        #refreshAllBtn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            height: 22px;
        }
        #refreshAllBtn:hover { background: #e4e4e4; }
        #refreshAllBtn.spinning svg { animation: spin 0.6s linear; }

        /* Loading bar */
        #loadingBar {
            width: 64px; height: 4px;
            background: #1e293b;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        #loadingBar.active { display: block; }
        #loadingBar::after {
            content: '';
            display: block;
            width: 40%; height: 100%;
            background: #38bdf8;
            border-radius: 2px;
            animation: loadSlide 1s ease-in-out infinite;
        }
        @keyframes loadSlide {
            0%   { transform: translateX(-150%); }
            100% { transform: translateX(400%);  }
        }

        #layoutPopup {
            display: none;
            position: fixed;
            z-index: 400;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 7px;
            padding: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            font-family: Arial, sans-serif;
        }
        #layoutPopup .lp-title {
            font-size: 9px;
            color: #64748b;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .lp-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .lp-row {
            display: flex;
            gap: 5px;
        }
        .lp-option {
            width: 36px;
            height: 26px;
            border: 1px solid #475569;
            border-radius: 3px;
            background: #0f172a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            box-sizing: border-box;
            transition: border-color 0.12s, background 0.12s;
        }
        .lp-option:hover   { border-color: #94a3b8; background: #1e293b; }
        .lp-option.active  { border-color: #3b82f6; background: #1e3a5f; }
        .lp-option svg rect { fill: #475569; }
        .lp-option:hover svg rect   { fill: #94a3b8; }
        .lp-option.active svg rect  { fill: #3b82f6; }

        /* ── Toast notifications ── */
        #toastContainer {
            position: fixed;
            top: 54px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            position: relative;
            padding: 10px 32px 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
            opacity: 1;
            transition: opacity 0.4s ease;
            max-width: 320px;
            white-space: pre-wrap;
            pointer-events: all;
        }
        .toast-close {
            position: absolute;
            top: 6px;
            right: 8px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            padding: 0 2px;
        }
        .toast-close:hover { color: #fff; }
        .toast.success { background: #15803d; border-left: 4px solid #4ade80; }
        .toast.error   { background: #b91c1c; border-left: 4px solid #f87171; }
        .toast.info    { background: #1d4ed8; border-left: 4px solid #93c5fd; }
        .toast.warn    { background: #92400e; border-left: 4px solid #fbbf24; }

        /* ── Chart grid & panels ── */
        #chartGrid {
            display: grid;
            width: 100vw;
            gap: 1px;
            background: #2a2a2a;
            overflow: hidden;
        }
        .chart-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            background: #000;
            overflow: hidden;
        }
        .chart-panel.active::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #60a5fa;
            pointer-events: none;
            z-index: 9999;
        }
        .panel-chart-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        /* container for label + refresh, sits top-right before the price axis */
        .panel-top-bar {
            position: absolute;
            top: 8px;
            right: 72px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
            pointer-events: none;
            user-select: none;
        }
        .panel-label {
            font-size: 11px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #fff;
            padding: 2px 7px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .panel-label.ce-label { background: rgba(22,163,74,0.80); }
        .panel-label.pe-label { background: rgba(220,38,38,0.80); }
        .panel-label.no-label { background: rgba(51,65,85,0.70); }
        .panel-refresh-btn {
            pointer-events: all;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: #0f172a;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0.75;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }
        .panel-refresh-btn:hover { opacity: 1; }
        .panel-refresh-btn.spinning svg { animation: spin 0.6s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .panel-bottom-bar {
            position: absolute;
            bottom: 38px;
            left: 4px;
            z-index: 10;
            display: flex;
            gap: 4px;
        }
        .panel-scroll-btn {
            pointer-events: all;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: #0f172a;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0.75;
            transition: opacity 0.15s;
            font-size: 10px;
            line-height: 1;
        }
        .panel-scroll-btn:hover { opacity: 1; }

        /* ── Saved Layouts modal ── */
        #layoutsOverlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        #layoutsOverlay.open { display: flex; }
        #layoutsModal {
            background: #1e2330;
            border: 1px solid #334155;
            border-radius: 8px;
            width: 380px;
            height: 520px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            font-family: Arial, sans-serif;
            color: #e2e8f0;
            position: relative;
            z-index: 10001;
        }
        #layoutsModal .lm-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px 10px;
            border-bottom: 1px solid #334155;
        }
        #layoutsModal .lm-header h3 {
            margin: 0; font-size: 14px; font-weight: 600; color: #f1f5f9;
        }
        #layoutsModal .lm-close {
            background: none; border: none; color: #64748b; font-size: 18px;
            cursor: pointer; line-height: 1; padding: 2px 4px; border-radius: 3px;
        }
        #layoutsModal .lm-close:hover { color: #e2e8f0; background: #334155; }
        #layoutsModal .lm-search {
            padding: 10px 16px 8px;
            border-bottom: 1px solid #1e293b;
        }
        #layoutsModal .lm-search input {
            width: 100%; box-sizing: border-box;
            background: #0f172a; border: 1px solid #475569;
            border-radius: 4px; color: #e2e8f0; font-size: 12px;
            padding: 6px 10px; outline: none;
        }
        #layoutsModal .lm-search input::placeholder { color: #64748b; }
        #layoutsModal .lm-search input:focus { border-color: #3b82f6; }
        #layoutsModal .lm-list {
            overflow-y: auto; flex: 1; padding: 6px 0;
        }
        .lm-item {

</head>

<script>
/* ======================
   CHART OPTIONS FACTORY
====================== */
function makeChartOptions(w, h) {
    return {
        width: w, height: h,
        timeScale: {
            timeVisible: true, secondsVisible: true, rightOffset: 10, shiftVisibleRangeOnNewBar: false, fixRightEdge: false,
            tickMarkFormatter: (time) => {
                const date = new Date(time * 1000);
                const ist = new Date(date.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
                const h = ist.getHours(), m = ist.getMinutes();
                if (h < 9 || (h === 9 && m < 15)) return '';
                return date.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
            }
        },
        rightPriceScale: { autoScale: true, scaleMargins: { top: 0.2, bottom: 0.2 } },
        localization: {
            locale: 'en-IN',
            timeFormatter: (time) => {
                const date = new Date(time * 1000);
                return date.toLocaleString('en-IN', {
                    timeZone: 'Asia/Kolkata', day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
                });
            }
        },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
    };
}

/* ======================
   CONSTANTS & GLOBALS
====================== */
const INTERVAL  = 5;
const LOT_SIZES = { NIFTY: 65, SENSEX: 20, BANKNIFTY: 30 };
const SL_COLOR  = { pending: '#06b6d4', placed: '#fb923c', hit: '#6b7280' };
const LAYOUT_CONFIGS = {
    '1':  { cols: 1, rows: 1 }, '2h': { cols: 2, rows: 1 }, '2v': { cols: 1, rows: 2 },
    '4':  { cols: 2, rows: 2 }, '6a': { cols: 3, rows: 2 }, '6b': { cols: 2, rows: 3 },
    '8a': { cols: 4, rows: 2 }, '8b': { cols: 2, rows: 4 },
};

let strikeMap    = {};
let panels       = [];
let activePanel  = null;
let activeLayout = '1';
let isMaximized  = false;
let syncCharts   = false;
let _syncLock    = false;

const ICON_EXPAND  = `<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6V1h5"/><path d="M10 1h5v5"/><path d="M15 10v5h-5"/><path d="M6 15H1v-5"/></svg>`;
const ICON_RESTORE = `<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 1v5H1"/><path d="M15 6h-5V1"/><path d="M10 15v-5h5"/><path d="M1 10h5v5"/></svg>`;

// Order bar state (shared, reflects active panel)
let currentLTP   = null;
let orderLots    = 1;
let orderLotSize = 65;
let orderType      = 'L';
let limitBuffer    = 0.20;
let limitDefaultSL = 10;
let slBuffer          = 0.20;
let slDistance        = 5;
let slDefaultDist     = 5;
let slAutoCancelCount = 1;
let slAutoSlIncCount  = 1;
let slAtCost          = false;

/* ======================
   PANEL FACTORY
====================== */
function createPanel(id) {
    // ── DOM ───────────────────────────────────────
    const panelEl = document.createElement('div');
    panelEl.className = 'chart-panel';

    const chartAreaEl = document.createElement('div');
    chartAreaEl.className = 'panel-chart-area';

    const topBarEl = document.createElement('div');
    topBarEl.className = 'panel-top-bar';

    const labelEl = document.createElement('div');
    labelEl.className = 'panel-label no-label';

    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'panel-refresh-btn';
    refreshBtn.title = 'Refresh chart';
    refreshBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`;

    topBarEl.appendChild(labelEl);
    topBarEl.appendChild(refreshBtn);
    chartAreaEl.appendChild(topBarEl);

    const bottomBarEl = document.createElement('div');
    bottomBarEl.className = 'panel-bottom-bar';
    const scrollLeftBtn = document.createElement('button');
    scrollLeftBtn.className = 'panel-scroll-btn';
    scrollLeftBtn.title = 'Scroll left 200 candles';
    scrollLeftBtn.innerHTML = `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;
    bottomBarEl.appendChild(scrollLeftBtn);
    chartAreaEl.appendChild(bottomBarEl);

    panelEl.appendChild(chartAreaEl);
    document.getElementById('chartGrid').appendChild(panelEl);

    // ── Chart ─────────────────────────────────────
    const chart = LightweightCharts.createChart(chartAreaEl, makeChartOptions(400, 300));
    const candleSeries = chart.addBarSeries({ upColor: '#22c55e', downColor: '#ef4444', thinBars: true, lastValueVisible: false });

    // ── Scroll-left button ────────────────────────
    scrollLeftBtn.addEventListener('click', e => {
        e.stopPropagation();
        const SHIFT = 90;
        const applyShift = p => {
            const r = p.chart.timeScale().getVisibleLogicalRange();
            if (!r) return;
            p.chart.timeScale().setVisibleLogicalRange({ from: r.from - SHIFT, to: r.to - SHIFT });
        };
        if (syncCharts) {
            _syncLock = true;
            try { panels.filter(p => p.symbol).forEach(applyShift); }
            finally { _syncLock = false; }
        } else {
            applyShift(panel);
        }
    });

    // ── Axis sync + lazy historical load ──────────
    chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        // Lazy-load previous day when user scrolls to the beginning
        if (range && range.from <= 2 && historyLoaded && !_histMode && !isLoadingHistory && !noMoreHistory) {
            loadPreviousDay();
        }
        // X-axis sync
        if (!syncCharts || _syncLock || !range) return;
        _syncLock = true;
        try {
            panels.forEach(other => {
                if (other.id !== id && other.symbol) {
                    other.chart.timeScale().setVisibleLogicalRange(range);
                }
            });
        } finally {
            _syncLock = false;
        }
    });

    // ── Per-panel state ───────────────────────────
    let symbol         = null;
    let socket         = null;
    let reconnectTimeout = null;
    let currentCandle  = null;
    let gapDetails     = new Map();
    let historyLoaded  = false;
    let lastCandleTime = null;
    let crosshairPrice = null;
    let livePriceLine    = null;
    let slPriceLine      = null;
    let slPrice          = null;
    let slLineState      = 'none';
    let slOrderId        = null;
    let slDragging       = false;
    let slPollTimer      = null;
    let slTriggerBuffer  = 0.20;
    let panelLots        = 1;   // per-panel lot count, preserved across focus switches
    // ── Lazy history load state ───────────────────
    let allCandles       = [];
    let earliestDate     = null;
    let isLoadingHistory = false;
    let noMoreHistory    = false;

    // ── Lazy previous-day loader ──────────────────
    async function loadPreviousDay() {
        if (isLoadingHistory || noMoreHistory || !symbol || _histMode) return;
        isLoadingHistory = true;
        let prevDate = new Date(earliestDate + 'T00:00:00Z');
        let attempts = 0, prevCandles = [], prevGapsRaw = [], foundDate = null;
        while (attempts < 7 && prevCandles.length === 0) {
            prevDate.setUTCDate(prevDate.getUTCDate() - 1);
            const dow = prevDate.getUTCDay();
            if (dow === 0 || dow === 6) { attempts++; continue; }
            const dateStr = prevDate.toISOString().split('T')[0];
            try {
                const [histRes, gapRes] = await Promise.all([
                    fetch(`/api/history/${symbol}?date=${dateStr}`),
                    fetch(`/api/gaps/${symbol}?date=${dateStr}`)
                ]);
                const histData = await histRes.json();
                const gapData  = await gapRes.json();
                prevCandles = histData.map(c => ({ time: c[0] - 19800, open: c[1], high: c[2], low: c[3], close: c[4] }));
                prevGapsRaw = gapData;
                if (prevCandles.length > 0) foundDate = dateStr;
            } catch (_) {}
            attempts++;
        }
        if (prevCandles.length === 0) { noMoreHistory = true; isLoadingHistory = false; return; }
        earliestDate = foundDate;
        prevGapsRaw.forEach(g => {
            const dir = g.direction === 'UP' ? 'D' : 'U';
            gapDetails.set(g.time - 19800, {
                dir, from: g.prev_price, to: g.curr_price,
                jump: Math.abs(g.curr_price - g.prev_price).toFixed(2),
                rangeLow: Math.min(g.prev_price, g.curr_price), rangeHigh: Math.max(g.prev_price, g.curr_price),
                volume: g.vol_change || 0, isFilled: false
            });
        });
        allCandles = [...prevCandles, ...allCandles];
        allCandles.forEach(candle => gapDetails.forEach((gap, gapTime) => {
            if (!gap.isFilled && candle.time > gapTime &&
                ((gap.dir === 'D' && candle.low <= gap.from) || (gap.dir === 'U' && candle.high >= gap.from)))
                gap.isFilled = true;
        }));
        const range = chart.timeScale().getVisibleLogicalRange();
        candleSeries.setData(allCandles);
        refreshMarkers();
        if (range) {
            _syncLock = true;
            try {
                chart.timeScale().setVisibleLogicalRange({ from: range.from + prevCandles.length, to: range.to + prevCandles.length });
            } finally { _syncLock = false; }
        }
        isLoadingHistory = false;
    }

    // ── Chart crosshair ───────────────────────────
    chart.subscribeCrosshairMove(param => {
        if (!param.point) {
            document.getElementById('tooltip').style.display = 'none';
            return;
        }
        // crosshairPrice only tracked on active panel
        if (panel === activePanel) {
            const price = candleSeries.coordinateToPrice(param.point.y);
            if (price !== null) crosshairPrice = price;
        }
        const tooltip = document.getElementById('tooltip');
        if (!param.time || !gapDetails.has(param.time)) { tooltip.style.display = 'none'; return; }
        const g = gapDetails.get(param.time);
        tooltip.innerHTML = `<b>Gap ${g.dir}</b><br/>From: ${g.from}<br/>To: ${g.to}<br/>Jump: ${g.jump}<br/>Range: ${g.rangeLow} → ${g.rangeHigh}<br/><b>Volume:</b> ${g.volume}`;
        // offset by panel position so tooltip appears in the correct panel
        const rect = chartAreaEl.getBoundingClientRect();
        tooltip.style.left = (rect.left + param.point.x + 15) + 'px';
        tooltip.style.top  = (rect.top  + param.point.y + 15) + 'px';
        tooltip.style.display = 'block';
    });

    function updateGoToLiveBtn() {
        if (panel !== activePanel) return;
        const btn = document.getElementById('goToLive');
        if (!lastCandleTime) { btn.style.display = 'none'; return; }
        const range = chart.timeScale().getVisibleRange();
        btn.style.display = (!range || lastCandleTime > range.to) ? 'flex' : 'none';
    }

    chart.timeScale().subscribeVisibleTimeRangeChange(() => updateGoToLiveBtn());

    // ── Helpers ───────────────────────────────────
    function getBucketTime(t) { return Math.floor(t / INTERVAL) * INTERVAL; }

    function updateChartLabel(sym) {
        if (!sym) { labelEl.innerHTML = ''; labelEl.className = 'panel-label no-label'; return; }
        const index = sym.startsWith('SENSEX') ? 'SENSEX' : sym.startsWith('BANKNIFTY') ? 'BANKNIFTY' : sym.startsWith('FINNIFTY') ? 'FINNIFTY' : sym.startsWith('MIDCPNIFTY') ? 'MIDCPNIFTY' : 'NIFTY';
        // Try strikeMap first (live mode), fall back to parsing symbol name directly (historical mode)
        const display = Object.keys(strikeMap).find(k => strikeMap[k] === sym);
        let strike, type;
        if (display) {
            const part = display.split('|')[1]?.trim() || '';
            [strike, type] = part.split(' ');
        } else {
            // Parse from symbol name e.g. NIFTY2631723300PE → strike=23300, type=PE
            // Format: {INDEX}{YY}{M}{DD}{STRIKE}{CE|PE} — expiry is always 5 chars after index
            const prefixes = ['BANKNIFTY', 'MIDCPNIFTY', 'FINNIFTY', 'SENSEX', 'NIFTY'];
            const prefix = prefixes.find(p => sym.startsWith(p));
            if (prefix) {
                const rest = sym.slice(prefix.length); // e.g. "2631723300PE"
                type   = rest.slice(-2);               // "CE" or "PE"
                strike = rest.slice(5, -2);            // skip 5 expiry chars, remove type
            }
        }
        if (!strike || !type) { labelEl.innerHTML = ''; labelEl.className = 'panel-label no-label'; return; }
        labelEl.className = `panel-label ${type === 'CE' ? 'ce-label' : 'pe-label'}`;
        labelEl.innerHTML = `${index} - ${strike} ${type}`;
    }

    function refreshMarkers() {
        candleSeries.setMarkers(Array.from(gapDetails.entries()).map(([time, info]) => ({
            time,
            position: info.dir === 'D' ? 'aboveBar' : 'belowBar',
            color: info.isFilled ? (info.dir === 'D' ? 'rgba(0,128,0,0.3)' : 'rgba(255,0,0,0.3)') : (info.dir === 'D' ? 'green' : 'red'),
            shape: 'text', text: info.dir
        })));
    }

    function checkGapFill(candle) {
        let updated = false;
        gapDetails.forEach(gap => {
            if (!gap.isFilled && ((gap.dir === 'D' && candle.low <= gap.from) || (gap.dir === 'U' && candle.high >= gap.from))) {
                gap.isFilled = true; updated = true;
            }
        });
        if (updated) refreshMarkers();
    }

    // ── SL ────────────────────────────────────────
    function updateSLLineLocal(price, state) {
        if (slPriceLine) { candleSeries.removePriceLine(slPriceLine); slPriceLine = null; }
        if (price == null || state === 'none') {
            slPrice = null; slLineState = 'none';
            if (panel === activePanel) updateSLBadge();
            return;
        }
        slPrice = price; slLineState = state;
        slPriceLine = candleSeries.createPriceLine({
            price, color: SL_COLOR[state] || SL_COLOR.pending,
            lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: `SL ${price}`
        });
        if (panel === activePanel) updateSLBadge();
    }

    function stopSLPoll() { if (slPollTimer) { clearInterval(slPollTimer); slPollTimer = null; } }

    function startSLPoll(sym) {
        stopSLPoll();
        slPollTimer = setInterval(async () => {
            if (!sym) return;
            const res = await fetch(`/api/sl/${sym}`);
            const data = await res.json();
            if (data.state && data.state !== 'none') {
                const price = data.price || slPrice;
                if (data.state !== slLineState || price !== slPrice) {
                    updateSLLineLocal(price, data.state);
                    slOrderId = data.order_id || null;
                }
                if (data.trigger_buffer != null) slTriggerBuffer = data.trigger_buffer;
                if (data.state === 'hit') setTimeout(() => updateSLLineLocal(price, 'pending'), 2000);
            }
        }, 2000);
    }

    async function loadSLStateLocal(sym) {
        updateSLLineLocal(null, 'none'); slOrderId = null;
        try {
            const res = await fetch(`/api/sl/${sym}`);
            const data = await res.json();
            if (data.state && data.state !== 'none' && data.price) {
                updateSLLineLocal(data.price, data.state);
                slOrderId = data.order_id || null;
            }
            if (data.trigger_buffer != null) slTriggerBuffer = data.trigger_buffer;
        } catch (_) {}
    }

    // ── SL drag ───────────────────────────────────
    function isNearSL(clientY) {
        if (!slPrice) return false;
        const rect = chartAreaEl.getBoundingClientRect();
        const slY  = candleSeries.priceToCoordinate(slPrice);
        return slY !== null && Math.abs((clientY - rect.top) - slY) < 8;
    }
    function disableScroll() { chart.applyOptions({ handleScroll: { mouseWheel: true, pressedMouseMove: false, horzTouchDrag: false, vertTouchDrag: false } }); }
    function enableScroll()  { chart.applyOptions({ handleScroll: { mouseWheel: true, pressedMouseMove: true,  horzTouchDrag: true,  vertTouchDrag: true  } }); }

    chartAreaEl.addEventListener('mousemove', e => {
        if (!slPrice) return;
        const y = e.clientY - chartAreaEl.getBoundingClientRect().top;
        if (isNearSL(e.clientY)) { chartAreaEl.style.cursor = 'ns-resize'; disableScroll(); }
        else if (!slDragging)    { chartAreaEl.style.cursor = 'default';   enableScroll();  }
        if (slDragging) {
            const p = candleSeries.coordinateToPrice(y);
            if (p !== null) updateSLLineLocal(Math.round(p * 20) / 20, slLineState === 'none' ? 'pending' : slLineState);
        }
    });

    chartAreaEl.addEventListener('mousedown', e => {
        if (slPrice && isNearSL(e.clientY)) { slDragging = true; disableScroll(); e.stopPropagation(); }
    });

    chartAreaEl.addEventListener('mouseup', async () => {
        if (!slDragging) return;
        slDragging = false; chartAreaEl.style.cursor = 'default'; enableScroll();
        if (!slPrice || !symbol) return;
        await fetch('/api/sl/set', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ symbol, price: slPrice }) });
    });

    chartAreaEl.addEventListener('dblclick', async () => {
        if (!symbol || crosshairPrice === null) return;
        const p = Math.round(crosshairPrice * 20) / 20;
        updateSLLineLocal(p, 'pending');
        await fetch('/api/sl/set', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ symbol, price: p }) });
    });

    chartAreaEl.addEventListener('contextmenu', e => {
        if (!slPrice || !isNearSL(e.clientY)) return;
        e.preventDefault();
        const menu = document.getElementById('slContextMenu');
        document.getElementById('slCmBuffer').value = slTriggerBuffer;
        // position near cursor, keep within viewport
        const mw = 200, mh = 120;
        const left = Math.min(e.clientX, window.innerWidth  - mw - 8);
        const top  = Math.min(e.clientY, window.innerHeight - mh - 8);
        menu.style.left    = left + 'px';
        menu.style.top     = top  + 'px';
        menu.style.display = 'block';
        menu._panel  = panel;
        menu._symbol = symbol;
        setTimeout(() => { const el = document.getElementById('slCmBuffer'); el.focus(); el.select(); }, 0);
    });

    // ── WebSocket ─────────────────────────────────
    function connectWebSocket(sym) {
        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${proto}//${window.location.host}/ws/${sym}`);
        socket.onopen = () => console.log(`[P${id}] Connected:`, sym);
        socket.onmessage = event => {
            if (!historyLoaded || !symbol) return;
            const tick = JSON.parse(event.data);
            if (tick.type === 'ping') return;
            if (tick.symbol && tick.symbol !== symbol) return;
            const bucketTime = getBucketTime(Math.floor(Number(tick.time)));
            const price = tick.value;
            if (lastCandleTime !== null && bucketTime < lastCandleTime) return;
            if (tick.is_gap) {
                const dir = tick.direction === "UP" ? "D" : "U";
                gapDetails.set(bucketTime, {
                    dir, from: tick.prev_price, to: price,
                    jump: Math.abs(price - tick.prev_price).toFixed(2),
                    rangeLow: Math.min(tick.prev_price, price), rangeHigh: Math.max(tick.prev_price, price),
                    volume: tick.vol_change || 0, isFilled: false
                });
                refreshMarkers();
            }
            if (!currentCandle || bucketTime > currentCandle.time) {
                currentCandle = { time: bucketTime, open: price, high: price, low: price, close: price };
                lastCandleTime = bucketTime;
                updateGoToLiveBtn();
            } else if (bucketTime === currentCandle.time) {
                currentCandle.high  = Math.max(currentCandle.high,  price);
                currentCandle.low   = Math.min(currentCandle.low,   price);
                currentCandle.close = price;
            } else return;
            if (panel === activePanel) updateOrderBar(price);
            if (currentCandle && !isNaN(currentCandle.open)) candleSeries.update(currentCandle);
            if (livePriceLine) livePriceLine.applyOptions({
                price,
                color: price >= currentCandle.open ? '#22c55e' : '#ef4444'
            });
            checkGapFill(currentCandle);
        };
        socket.onclose = event => {
            if (event.target._intentionalClose || !symbol) return;
            reconnectTimeout = setTimeout(() => connectWebSocket(symbol), 3000);
        };
        socket.onerror = () => socket.close();
    }

    // ── Load symbol ───────────────────────────────
    async function panelLoadSymbol(sym, prefetched = null, nocache = false, histDate = null) {
        if (!sym) return;
        historyLoaded = false; symbol = sym;
        const display = Object.keys(strikeMap).find(k => strikeMap[k] === sym) || sym;
        updateChartLabel(sym);
        if (panel === activePanel) {
            document.getElementById('symbolSelect').value = histDate ? sym : display;
            resetOrderBar(sym);
            panelLots = 1;  // new symbol → reset this panel's saved lot count
        }
        if (socket) { socket._intentionalClose = true; socket.close(); socket = null; }
        if (reconnectTimeout) { clearTimeout(reconnectTimeout); reconnectTimeout = null; }
        if (livePriceLine) { candleSeries.removePriceLine(livePriceLine); livePriceLine = null; }
        candleSeries.setData([]); currentCandle = null; gapDetails.clear(); lastCandleTime = null;
        stopSLPoll();
        let history, gapsRaw;
        if (prefetched) {
            history  = prefetched.history;
            gapsRaw  = prefetched.gaps;
        } else {
            const params = new URLSearchParams();
            if (nocache) params.set('nocache', 'true');
            if (histDate) params.set('date', histDate);
            const qs = params.toString() ? '?' + params.toString() : '';
            const [histRes, gapRes] = await Promise.all([fetch(`/api/history/${sym}${qs}`), fetch(`/api/gaps/${sym}${qs}`)]);
            history  = await histRes.json();
            gapsRaw  = await gapRes.json();
        }
        const candles = history.map(c => ({ time: c[0] - 19800, open: c[1], high: c[2], low: c[3], close: c[4] }));
        lastCandleTime = candles.length ? candles[candles.length - 1].time : null;
        // Initialise lazy-load state for new symbol
        allCandles       = [...candles];
        isLoadingHistory = false;
        noMoreHistory    = false;
        earliestDate     = candles.length
            ? new Date((candles[0].time + 19800) * 1000).toISOString().split('T')[0]
            : new Date().toISOString().split('T')[0];
        gapsRaw.forEach(g => {
            const dir = g.direction === 'UP' ? 'D' : 'U';
            gapDetails.set(g.time - 19800, {
                dir, from: g.prev_price, to: g.curr_price,
                jump: Math.abs(g.curr_price - g.prev_price).toFixed(2),
                rangeLow: Math.min(g.prev_price, g.curr_price), rangeHigh: Math.max(g.prev_price, g.curr_price),
                volume: g.vol_change || 0, isFilled: false
            });
        });
        candles.forEach(candle => gapDetails.forEach((gap, gapTime) => {
            if (!gap.isFilled && candle.time > gapTime &&
                ((gap.dir === 'D' && candle.low <= gap.from) || (gap.dir === 'U' && candle.high >= gap.from)))
                gap.isFilled = true;
        }));
        candleSeries.setData(candles);
        refreshMarkers();
        if (candles.length > 0) {
            const halfBars = Math.max(10, Math.floor(chartAreaEl.offsetWidth / 12));
            chart.timeScale().applyOptions({ rightOffset: halfBars });
            chart.timeScale().scrollToRealTime();
        }
        if (candles.length > 0) {
            currentCandle = { ...candles[candles.length - 1] };
            lastCandleTime = currentCandle.time;
            if (!histDate) {
                livePriceLine = candleSeries.createPriceLine({
                    price: currentCandle.close,
                    color: currentCandle.close >= currentCandle.open ? '#22c55e' : '#ef4444',
                    lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: ''
                });
            }
        }
        historyLoaded = true;
        setTimeout(() => chart.priceScale('right').applyOptions({ autoScale: true }), 50);
        if (!histDate) saveViewState();
        // Skip live features in historical mode
        if (!histDate) {
            loadSLStateLocal(sym);
            startSLPoll(sym);
            connectWebSocket(sym);
        }
    }

    // ── Activate on click ─────────────────────────
    panelEl.addEventListener('mousedown', () => activatePanel(panel));

    // ── Refresh button ───────────────────────────
    refreshBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!symbol) return;
        refreshBtn.classList.add('spinning');
        await panelLoadSymbol(symbol, null, true);
        refreshBtn.classList.remove('spinning');
    });

    // ── Resize ────────────────────────────────────
    function resize() {
        const w = chartAreaEl.offsetWidth;
        const h = chartAreaEl.offsetHeight;
        if (w > 0 && h > 0) chart.applyOptions({ width: w, height: h });
    }

    // ── Destroy ───────────────────────────────────
    function destroy() {
        stopSLPoll();
        if (socket) { socket._intentionalClose = true; socket.close(); }
        if (reconnectTimeout) clearTimeout(reconnectTimeout);
        chart.remove();
        panelEl.remove();
    }

    function scrollToEnd() {
        if (!allCandles.length) return;
        const w          = chartAreaEl.offsetWidth || 400;
        const barPx      = 6;
        const visibleBars = Math.max(20, Math.floor(w / barPx));
        const rightOff   = Math.max(6, Math.floor(w / 12));
        chart.priceScale('right').applyOptions({ autoScale: true });
        chart.timeScale().setVisibleLogicalRange({
            from: allCandles.length - visibleBars + rightOff,
            to:   allCandles.length - 1 + rightOff,
        });
    }

    const panel = {
        id, el: panelEl,
        get symbol()         { return symbol; },
        get crosshairPrice() { return crosshairPrice; },
        get slPrice()           { return slPrice; },
        get slLineState()       { return slLineState; },
        get slOrderId()         { return slOrderId; },
        get slTriggerBuffer()   { return slTriggerBuffer; },
        set slTriggerBuffer(v)  { slTriggerBuffer = v; },
        get panelLots()         { return panelLots; },
        set panelLots(v)        { panelLots = v; },
        get chart()             { return chart; },
        updateGoToLiveBtn,
        loadSymbol: panelLoadSymbol,
        updateSLLine: updateSLLineLocal,
        scrollToEnd,
        resize, destroy,
    };
    return panel;
}

/* ======================
   PANEL MANAGEMENT
====================== */
function activatePanel(p) {
    if (activePanel === p) return;
    if (activePanel) activePanel.el.classList.remove('active');
    activePanel = p;
    p.el.classList.add('active');
    const sym = p.symbol;
    if (sym) {
        const display = Object.keys(strikeMap).find(k => strikeMap[k] === sym) || sym;
        document.getElementById('symbolSelect').value = display;
        // Restore this panel's lot count — don't reset to 1 on focus switch
        orderLotSize = getLotSize(sym);
        orderLots    = p.panelLots;
        currentLTP   = null;
        document.getElementById('qtyPopupTitle').textContent =
            `Quantity (${getIndexName(sym)} · ${orderLotSize}/lot)`;
        updateOrderBar(null);
    }
    updateSLBadge();
    if (p.updateGoToLiveBtn) p.updateGoToLiveBtn();
}

// Global bridges — delegate to activePanel
function loadSymbol(symbol) { if (activePanel) activePanel.loadSymbol(symbol); }
function updateSLLine(price, state) { if (activePanel) activePanel.updateSLLine(price, state); }

/* ======================
   LAYOUT MANAGEMENT
====================== */
function selectLayout(el) {
    document.querySelectorAll('.lp-option').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
    activeLayout = el.dataset.layout;
    if (syncCharts) toggleSyncCharts();
    document.getElementById('layoutPopup').style.display = 'none';

    // Sync the topbar button icon to the selected layout's SVG
    const optSvg = el.querySelector('svg');
    if (optSvg) {
        const btn = document.getElementById('layoutBtn');
        const clone = optSvg.cloneNode(true);
        clone.setAttribute('width', '18');
        clone.setAttribute('height', '14');
        btn.innerHTML = '';
        btn.appendChild(clone);
    }

    // Reset maximize if active
    if (isMaximized) {
        isMaximized = false;
        document.getElementById('maximizeBtn').innerHTML = ICON_EXPAND;
        document.getElementById('maximizeBtn').title = 'Maximize panel';
    }

    const prevSymbol = activePanel ? activePanel.symbol : null;
    panels.forEach(p => p.destroy());
    panels = [];
    activePanel = null;

    const cfg  = LAYOUT_CONFIGS[activeLayout];
    const grid = document.getElementById('chartGrid');
    grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${cfg.rows}, 1fr)`;
    updateLayout();

    const n = cfg.cols * cfg.rows;
    for (let i = 0; i < n; i++) panels.push(createPanel(i));

    activatePanel(panels[0]);

    requestAnimationFrame(() => {
        panels.forEach(p => p.resize());
        const autoMode = document.getElementById('autoPopulateSelect').value;
        if (autoMode) {
            autoPopulatePanels(autoMode).catch(() => {});
        } else if (prevSymbol) {
            panels[0].loadSymbol(prevSymbol);
        }
    });
}

function toggleLayoutPopup(e) {
    if (e) e.stopPropagation();
    const p = document.getElementById('layoutPopup');
    if (p.style.display === 'block') { p.style.display = 'none'; return; }
    const btn  = document.getElementById('layoutBtn');
    const rect = btn.getBoundingClientRect();
    p.style.left = rect.left + 'px';
    p.style.top  = (rect.bottom + 4) + 'px';
    p.style.display = 'block';
}

document.addEventListener('click', (e) => {
    const p   = document.getElementById('layoutPopup');
    const btn = document.getElementById('layoutBtn');
    if (p && p.style.display === 'block' && !p.contains(e.target) && e.target !== btn && !btn.contains(e.target))
        p.style.display = 'none';
});

/* ======================
   STRIKE MAP & TOPBAR
====================== */
// ── Chart axis sync ───────────────────────────────────────────────────────
function toggleSyncCharts() {
    syncCharts = !syncCharts;
    const btn = document.getElementById('syncBtn');
    btn.classList.toggle('active', syncCharts);
    btn.title = syncCharts ? 'Chart sync ON — click to disable' : 'Sync chart axes';

                });
            } finally {
                _syncLock = false;
            }
        }
    }

async function loadStrikes() {
    const [strikesRes, atmRes] = await Promise.all([fetch("/api/strikes"), fetch("/api/atm-symbol")]);
    const strikes = await strikesRes.json();
    const atm     = await atmRes.json();
    const dataList = document.getElementById("symbolList");
    dataList.innerHTML = "";
    strikeMap = {};
    // Add index symbols at the top of the datalist
    IDX_SYMBOLS.forEach(idx => {
        const opt = document.createElement("option");
        opt.value = idx;
        dataList.appendChild(opt);
    });
    strikes.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.display;
        dataList.appendChild(opt);
        strikeMap[item.display] = item.symbol;
    });
    if (strikes.length > 0) {
        const atmEntry     = atm.symbol ? strikes.find(s => s.symbol === atm.symbol) : null;
        const defaultEntry = atmEntry || strikes[0];
        document.getElementById("symbolSelect").value = defaultEntry.display;
        if (activePanel) activePanel.loadSymbol(defaultEntry.symbol, null, true);
    }
    // Background pre-warm: fetch likely auto-populate symbols so first click is instant
    prewarmAutoPopulate(atm);
}

async function prewarmAutoPopulate(atm) {
    try {
        const STEP = { NIFTY: 50, SENSEX: 100 };
        const n = 8;

        // Collect all symbols for both NIFTY and SENSEX across CE and PE
        const allSymbols = [];
        for (const [idx, s] of Object.entries(STEP)) {
            // Get ATM for this index: NIFTY uses the passed atm, SENSEX fetches separately
            let atmStrike = null;
            if (idx === 'NIFTY' && atm && atm.strike) {
                atmStrike = Math.round(atm.strike);
            } else {
                try {
                    const r = await fetch(`/api/atm-symbol?index=${idx}`);
                    const d = await r.json();
                    if (d.strike) atmStrike = Math.round(d.strike);
                } catch (_) {}
            }
            if (!atmStrike) continue;
            const ceStrikes = Array.from({ length: n }, (_, i) => atmStrike + (i - (n - 2)) * s);
            const peStrikes = Array.from({ length: n }, (_, i) => atmStrike + (n - 1 - i) * s);
            for (const strike of ceStrikes) {
                const k = Object.keys(strikeMap).find(d => d.endsWith(`| ${strike} CE`));
                if (k) allSymbols.push(strikeMap[k]);
            }
            for (const strike of peStrikes) {
                const k = Object.keys(strikeMap).find(d => d.endsWith(`| ${strike} PE`));
                if (k) allSymbols.push(strikeMap[k]);
            }
        }
        if (allSymbols.length === 0) return;
        fetch('/api/batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbols: allSymbols, nocache: false }),
        }).catch(() => {});
    } catch (_) {}
}

async function autoPopulatePanels(mode) {
    const total = panels.length;
    if (!total) return;
    showLoadingBar();

    // Split panels: top half = group1, bottom half = group2
    const g1Size = Math.ceil(total / 2);
    const g2Size = total - g1Size;

    // Determine index + option type for each group
    let g1Index, g1Type, g2Index, g2Type;
    if      (mode === 'nifty-sensex-ce') { g1Index='NIFTY';  g1Type='CE'; g2Index='SENSEX'; g2Type='CE'; }
    else if (mode === 'nifty-sensex-pe') { g1Index='NIFTY';  g1Type='PE'; g2Index='SENSEX'; g2Type='PE'; }
    else if (mode === 'nifty-ce-pe')     { g1Index='NIFTY';  g1Type='CE'; g2Index='NIFTY';  g2Type='PE'; }
    else if (mode === 'sensex-ce-pe')    { g1Index='SENSEX'; g1Type='CE'; g2Index='SENSEX'; g2Type='PE'; }
    else if (!['nifty-ce','nifty-pe','sensex-ce','sensex-pe'].includes(mode)) return;

    const STEP = { NIFTY: 50, SENSEX: 100 };

    // Fetch live index prices and compute ATM as floor(ltp/step)*step
    // If market is closed (LTP null), fall back to last known ATM from DB
    const ltpData = await fetch('/api/index-ltp').then(r => r.json());
    const atmMap = {};
    let usedFallback = false;
    for (const idx of ['NIFTY', 'SENSEX']) {
        const ltp = ltpData[idx] && ltpData[idx].ltp;
        if (ltp) {
            atmMap[idx] = Math.floor(ltp / STEP[idx]) * STEP[idx];
        } else {
            // Fallback: get ATM strike from DB (last known price via put-call parity)
            try {
                const atmRes = await fetch(`/api/atm-symbol?index=${idx}`).then(r => r.json());
                atmMap[idx] = atmRes.strike ? Math.round(atmRes.strike) : null;
                if (atmMap[idx]) usedFallback = true;
            } catch { atmMap[idx] = null; }
        }
    }
    if (usedFallback) toast('Market closed — using last known ATM from DB', 'warn');

    function getStrikes(index, type, n) {
        const atm = atmMap[index];
        if (!atm) return new Array(n).fill(null); // blank if Sensex not in DB
        const s = STEP[index];
        if (type === 'CE')
            // [ATM-(n-2)*s, ..., ATM, ATM+s] — ends with 1 OTM (ATM+step)
            return Array.from({ length: n }, (_, i) => atm + (i - (n - 2)) * s);
        else
            // [ATM+(n-1)*s, ..., ATM+s, ATM] — descending, ends with ATM (OTM for PE)
            return Array.from({ length: n }, (_, i) => atm + (n - 1 - i) * s);
    }

    // Find symbol in strikeMap by strike + type (nearest expiry comes first).
    // If not found (symbol not yet in DB), construct it using the expiry from
    // an existing strikeMap entry for the same index.
    function findSymbol(strike, type, index) {
        if (!strike) return null;
        const suffix = `| ${strike} ${type}`;
        for (const [display, sym] of Object.entries(strikeMap)) {
            if (display.endsWith(suffix)) return sym;
        }
        // Fallback: extract expiry from existing strikeMap entry for same index
        for (const sym of Object.values(strikeMap)) {
            if (sym.startsWith(index)) {
                const expiry = sym.slice(index.length, index.length + 5); // e.g. "26319"
                return `${index}${expiry}${strike}${type}`;
            }
        }
        return null;
    }

    // ── Single-index modes (Nifty CE / Nifty PE / Sensex CE / Sensex PE) ──
    if (['nifty-ce','nifty-pe','sensex-ce','sensex-pe'].includes(mode)) {
        const idxName = mode.startsWith('nifty') ? 'NIFTY' : 'SENSEX';
        const type    = mode.endsWith('ce')      ? 'CE'    : 'PE';
        const s       = STEP[idxName];
        const atm     = atmMap[idxName];
        if (!atm) { hideLoadingBar(); toast('ATM not available for ' + idxName, 'warn'); return; }

        const itmCount = Math.floor(total / 2);
        const otmCount = total - itmCount;

        // CE: ascending strikes — ITM (low) on left, OTM (high) on right
        // PE: descending strikes — ITM (high) on left, OTM (low) on right
        let strikes;
        if (type === 'CE') {
            const itm = Array.from({ length: itmCount }, (_, i) => atm - (itmCount - 1 - i) * s);
            const otm = Array.from({ length: otmCount }, (_, i) => atm + (i + 1) * s);
            strikes = [...itm, ...otm];
        } else {
            const itm = Array.from({ length: itmCount }, (_, i) => atm + (itmCount - 1 - i) * s);
            const otm = Array.from({ length: otmCount }, (_, i) => atm - (i + 1) * s);
            strikes = [...itm, ...otm];
        }

        const panelSymbols = strikes.map(strike => findSymbol(strike, type, idxName));
        // Load each panel independently in parallel — renders progressively as data arrives
        await Promise.all(panelSymbols.map((sym, i) => {
            if (!sym) return Promise.resolve();
            return panels[i].loadSymbol(sym, null, true);
        }));
        hideLoadingBar();
        saveViewState();
        return;
    }

    const g1Strikes = getStrikes(g1Index, g1Type, g1Size);
    const g2Strikes = getStrikes(g2Index, g2Type, g2Size);

    const g1Symbols = g1Strikes.map(s => findSymbol(s, g1Type, g1Index));
    const g2Symbols = g2Strikes.map(s => findSymbol(s, g2Type, g2Index));

    // For 2-column layouts with >2 rows: fill column-by-column so g1 goes down
    // the left column and g2 goes down the right column (e.g. CE left, PE right).
    // For all other layouts keep the default sequential (row-major) order.
    const cfg = LAYOUT_CONFIGS[activeLayout];
    let panelSymbols;
    if (cfg.cols === 2 && cfg.rows > 2) {
        panelSymbols = [];
        for (let row = 0; row < cfg.rows; row++) {
            panelSymbols.push(g1Symbols[row] || null);
            panelSymbols.push(g2Symbols[row] || null);
        }
    } else {
        panelSymbols = [...g1Symbols, ...g2Symbols];
    }

    // Load each panel independently in parallel — renders progressively as data arrives
    await Promise.all(panelSymbols.map((sym, i) => {
        if (!sym) return Promise.resolve();
        return panels[i].loadSymbol(sym, null, true);
    }));
    hideLoadingBar();
    saveViewState();
}

async function placeOrder(side) {
    if (!activePanel || !activePanel.symbol) { toast('No symbol selected', 'warn'); return; }
    const sym = activePanel.symbol;
    if (currentLTP == null) { toast('No LTP available yet', 'warn'); return; }
    let price = parseFloat(currentLTP.toFixed(2));
    if (orderType === 'L') price = parseFloat((price + (side === 'BUY' ? limitBuffer : -limitBuffer)).toFixed(2));
    const qty   = orderLots * orderLotSize;
    const label = `${side} ${qty} ${sym} @ ${price} [${orderType}]`;
    toast(`⏳ Placing ${label}…`, 'info', 2000);
    const res = await fetch('/api/place-limit-order', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ symbol: sym, price, side, qty, exchange: 'NFO', order_type: orderType, sl_buffer: slBuffer, sl_distance: slDistance }),
    });
    const data = await res.json();
    toastOrder(data, label);
    // Trigger post-fill automation for SL orders
    if (orderType === 'SL' && data.status === 'success' && data.order_id) {
        handleSlOrderFlow(data.order_id, side, sym, qty, data.price).catch(err => {
            toast(`⚠️ SL flow error: ${err.message}`, 'warn', 7000);
        });
    }
}

/* ─────────────────────────────────────────────────────────────
   POST-FILL SL AUTOMATION
   Triggered after a successful SL order from the order bar.
   Steps:
     1. Auto Cancel: wait N secs, try to cancel; if filled → proceed
     2. Place SL (at cost or default distance)
     3. Auto SL Increment: ratchet SL toward cost price in a loop
───────────────────────────────────────────────────────────── */
function roundTick(v, tick = 0.05) {
    return Math.round(Math.round(v / tick) * tick * 100) / 100;
}

async function handleSlOrderFlow(orderId, side, symbol, qty, fillPrice) {
    // Step 1: Auto Cancel check
    if (!document.getElementById('slCfgAutoCancel').checked) return;

    await new Promise(r => setTimeout(r, slAutoCancelCount * 1000));

    let cancelData;
    try {
        const cr = await fetch('/api/cancel-order', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ order_id: orderId }),
        });
        cancelData = await cr.json();
    } catch (e) {
        cancelData = { status: 'filled' };
    }

    if (cancelData.status === 'cancelled') {
        toast(`Order ${orderId} cancelled (not filled in ${slAutoCancelCount}s)`, 'warn', 6000);
        return;
    }
    // Assumed filled
    toast(`✅ Order filled @ ${fillPrice} — placing SL…`, 'info', 4000);

    // Step 2: Place SL (opposite side)
    const slSide = side === 'BUY' ? 'SELL' : 'BUY';
    let slOrderId  = null;
    let usedCostSl = false;

    if (slAtCost) {
        // SL at Cost: trigger just above/below fill price
        const trigger = roundTick(side === 'BUY' ? fillPrice + slBuffer : fillPrice - slBuffer);
        const limit   = roundTick(fillPrice);
        try {
            const r = await fetch('/api/place-sl-exact', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ symbol, side: slSide, qty, trigger, limit }),
            });
            const d = await r.json();
            if (d.status === 'success') {
                slOrderId  = d.order_id;
                usedCostSl = true;
                toast(`✅ SL at Cost placed @ trigger ${trigger} for ${symbol}`, 'success', 7000);
            } else {
                toast(`⚠️ SL at Cost failed (${d.message}) — using default SL`, 'warn', 5000);
            }
        } catch (e) {
            toast(`⚠️ SL at Cost error — using default SL`, 'warn', 5000);
        }
    }

    // Default SL (fallback or primary when SL at Cost not checked / failed)
    let defaultTrigger;
    if (!slOrderId) {
        defaultTrigger = roundTick(side === 'BUY'
            ? fillPrice - slDefaultDist
            : fillPrice + slDefaultDist);
        const defaultLimit = roundTick(side === 'BUY'
            ? defaultTrigger - slBuffer
            : defaultTrigger + slBuffer);
        try {
            const r = await fetch('/api/place-sl-exact', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ symbol, side: slSide, qty, trigger: defaultTrigger, limit: defaultLimit }),
            });
            const d = await r.json();
            if (d.status === 'success') {
                slOrderId = d.order_id;
                toast(`✅ Default SL placed @ trigger ${defaultTrigger} for ${symbol}`, 'success', 7000);
            } else {
                toast(`❌ SL placement failed: ${d.message}`, 'error', 10000);
                return;
            }
        } catch (e) {
            toast(`❌ SL placement error: ${e.message}`, 'error', 10000);
            return;
        }
    }

    // Step 3: Auto SL Increment (only when NOT using cost SL, since cost SL is already at/near cost)
    if (!usedCostSl && document.getElementById('slCfgAutoSlInc').checked && slOrderId) {
        const inc       = slAutoSlIncCount;
        let curTrigger  = defaultTrigger;

        const pastCost = (t) => side === 'BUY' ? t > fillPrice : t < fillPrice;

        while (!pastCost(curTrigger)) {
            curTrigger = roundTick(side === 'BUY' ? curTrigger + inc : curTrigger - inc);
            const newLimit = roundTick(side === 'BUY' ? curTrigger - slBuffer : curTrigger + slBuffer);
            try {
                const r = await fetch('/api/modify-sl-order', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ order_id: slOrderId, trigger: curTrigger, limit: newLimit }),
                });
                const d = await r.json();
                if (d.status !== 'success') {
                    toast(`🔔 SL triggered for ${symbol}`, 'info', 10000);
                    break;
                }
            } catch (e) {
                toast(`🔔 SL triggered for ${symbol}`, 'info', 10000);
                break;
            }
        }
    }
}

/* ======================

====================== */
function toast(msg, type = 'info', duration = 7000) {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    const btn = document.createElement('button');
    btn.className = 'toast-close';
    btn.textContent = '×';
    const dismiss = () => { el.style.opacity = '0'; setTimeout(() => el.remove(), 420); };
    btn.addEventListener('click', dismiss);
    el.appendChild(btn);
    container.appendChild(el);
    const timer = setTimeout(dismiss, duration);
    btn.addEventListener('click', () => clearTimeout(timer), { once: true });
}
function toastOrder(data, actionLabel) {
    if (!data) { toast(`${actionLabel}: no response`, 'error'); return; }
    if (data.status === 'success' || data.status === 'ok') {
        toast(`✅ ${actionLabel}${data.price ? ` @ ${data.price}` : ''}`, 'success');
    } else if (data.status === 'error') {
        toast(`❌ ${actionLabel} FAILED\n${data.message || ''}`, 'error', 10000);
    } else {
        toast(`⚠️ ${actionLabel}: ${JSON.stringify(data)}`, 'warn', 7000);
    }
}

   INDEX TICKER
====================== */
const idxSelection  = { 1: 'NIFTY', 2: 'SENSEX' };
const _idxPrevClose = {};   // sym → prev-close price (from initial API call)
const _idxLatestLtp = {};   // sym → latest ltp (updated by WS ticks)
const _idxWs        = {};   // sym → WebSocket instance
const IDX_SYMBOLS   = ['NIFTY', 'SENSEX', 'BANKNIFTY', 'FINNIFTY', 'MIDCPNIFTY'];

function toggleIdxMenu(group, e) {
    e.stopPropagation();
    const menu = document.getElementById('idxMenu' + group);
    const other = document.getElementById('idxMenu' + (group === 1 ? 2 : 1));
    other.classList.remove('open');
    menu.classList.toggle('open');
}

function selectIdx(group, key, el) {
    idxSelection[group] = key;
    document.getElementById('idxLabel' + group).textContent = key + ' ▾';
    document.getElementById('idxMenu' + group).querySelectorAll('.idx-menu-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('idxMenu' + group).classList.remove('open');
    // Re-render from stored latest ltp for the newly selected symbol
    if (_idxLatestLtp[key] != null) _renderIdxGroup(group, key, _idxLatestLtp[key]);
}

document.addEventListener('click', () => {
    document.getElementById('idxMenu1').classList.remove('open');
    document.getElementById('idxMenu2').classList.remove('open');
});

function _renderIdxGroup(group, sym, ltp) {
    const priceEl  = document.getElementById('idxPrice'  + group);
    const changeEl = document.getElementById('idxChange' + group);
    if (!priceEl) return;
    const prevClose  = _idxPrevClose[sym];
    const change     = prevClose != null ? ltp - prevClose : null;
    const changePct  = prevClose != null && prevClose !== 0 ? (change / prevClose) * 100 : null;
    const dir        = change > 0 ? ' up' : change < 0 ? ' down' : '';
    priceEl.textContent = ltp.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    priceEl.className   = 'idx-price' + dir;
    if (changeEl && change != null) {
        const sign = change >= 0 ? '+' : '';
        changeEl.textContent = `${sign}${change.toFixed(2)} (${changePct.toFixed(2)}%)`;
        changeEl.className   = 'idx-change' + dir;
    }
}

function _onIdxTick(sym, ltp) {
    _idxLatestLtp[sym] = ltp;
    for (const [group, key] of Object.entries(idxSelection)) {
        if (key === sym) _renderIdxGroup(group, sym, ltp);
    }
}

function _connectIdxSocket(sym) {
    if (_idxWs[sym] && _idxWs[sym].readyState < 2) return;
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${window.location.host}/ws/${sym}`);
    _idxWs[sym] = ws;
    ws.onmessage = e => {
        try {
            const tick = JSON.parse(e.data);
            if (tick.type === 'ping') return;
            const ltp = tick.value ?? tick.curr_price;
            if (ltp != null) _onIdxTick(sym, ltp);
        } catch (_) {}
    };
    ws.onclose = () => { setTimeout(() => _connectIdxSocket(sym), 3000); };
    ws.onerror = () => ws.close();
}

async function initIndexTicker() {
    try {
        const data = await fetch('/api/index-ltp').then(r => r.json());
        for (const sym of IDX_SYMBOLS) {
            const entry = data[sym];
            if (entry && entry.ltp != null && entry.change != null) {
                _idxPrevClose[sym] = entry.ltp - entry.change;
                _idxLatestLtp[sym] = entry.ltp;
            }
        }
        // Initial render for both groups
        for (const [group, sym] of Object.entries(idxSelection)) {
            const ltp = _idxLatestLtp[sym];
            if (ltp != null) _renderIdxGroup(group, sym, ltp);
        }
    } catch (e) {}
    // Switch to live WebSocket updates for all index symbols
    IDX_SYMBOLS.forEach(_connectIdxSocket);
}

initIndexTicker();

const LAYOUTS_KEY = 'otp_saved_layouts';
let _activeLayoutId = null;  // id of the currently-loaded named layout

function _getSavedLayouts() {

}
function _setSavedLayouts(list) {
    localStorage.setItem(LAYOUTS_KEY, JSON.stringify(list));
}
function _captureState() {
    return {
        layout:       activeLayout,
        autoPopulate: '',
        symbols:      panels.map(p => p.symbol || null),
    };
}

function openLayoutsModal() {
    document.getElementById('layoutsOverlay').classList.add('open');

function closeLayoutsModal() {

function _updateSaveBtn() {
    const btn = document.getElementById('btnSaveLayout');
    const layouts = _getSavedLayouts();
    const active  = layouts.find(l => l.id === _activeLayoutId);
    btn.textContent = active ? `Save "${active.name}"` : 'Save';
