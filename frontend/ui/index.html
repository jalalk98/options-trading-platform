function renderLayoutsList(query = '') {
    const list    = document.getElementById('layoutsList');
    const layouts = _getSavedLayouts();
    const q       = (query || '').toLowerCase().trim();
    const filtered = q ? layouts.filter(l => l.name.toLowerCase().includes(q)) : layouts;

    if (filtered.length === 0) {
        list.innerHTML = `<div class="lm-empty">${q ? 'No layouts match your search.' : 'No saved layouts yet.\nClick "Save as new…" to create one.'}</div>`;
        return;
    }

    list.innerHTML = filtered.map(l => {
        const syms = (l.symbols || []).filter(Boolean);
        const preview = syms.length ? syms.map(s => s.replace(/^(NIFTY|SENSEX|BANKNIFTY)(\d{2}[A-Z]{3}\d{2})?(\d+)(CE|PE)$/, '$3$4') || s).slice(0, 4).join(' · ') : '—';
        const dt  = l.savedAt ? new Date(l.savedAt).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
        const isActive = l.id === _activeLayoutId;
        return `<div class="lm-item${isActive ? ' active' : ''}" onclick="loadNamedLayout('${l.id}')">
            <div class="lm-item-info">
                <div class="lm-item-name">${_esc(l.name)}</div>
                <div class="lm-item-meta">${_esc(preview)}${dt ? ' · ' + dt : ''}</div>
            </div>
            <button class="lm-item-del" onclick="deleteNamedLayout(event,'${l.id}')" title="Delete">✕</button>
        </div>`;
    }).join('');
}

function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadNamedLayout(id) {
    const layouts = _getSavedLayouts();
    const layout  = layouts.find(l => l.id === id);
    if (!layout) return;

    _activeLayoutId = id;
    closeLayoutsModal();

    // Clear auto-populate BEFORE selectLayout so that selectLayout's
    // requestAnimationFrame reads '' and does NOT trigger autoPopulatePanels.
    const sel = document.getElementById('autoPopulateSelect');
    sel.value = '';

    // Apply panel grid layout
    const lpOption = document.querySelector(`.lp-option[data-layout="${layout.layout}"]`);
    if (lpOption) selectLayout(lpOption);

    // Wait for selectLayout's rAF to fire and finish before loading symbols.
    await new Promise(r => requestAnimationFrame(r));

    // Set tab title to layout name
    document.title = layout.name;

    // Load exact saved symbols
    const syms = layout.symbols || [];
    await Promise.all(syms.map((sym, i) => {
        if (!sym || !panels[i]) return Promise.resolve();
        return panels[i].loadSymbol(sym, null, false);
    }));

    // Move this layout to top of list (most-recently-used)
    const idx = layouts.findIndex(l => l.id === id);
    if (idx > 0) {
        layouts.splice(idx, 1);
        layouts.unshift(layout);
        _setSavedLayouts(layouts);
    }

    saveViewState();
    toast(`Layout "${layout.name}" loaded`, 'success');
}

async function saveCurrentLayout(forceNew) {
    const layouts = _getSavedLayouts();
    const existing = !forceNew && layouts.find(l => l.id === _activeLayoutId);

    let name;
    if (existing) {
        name = existing.name;
    } else {
        // Suggest a name based on active panel symbol or auto-populate mode
        const apSel = document.getElementById('autoPopulateSelect');
        const suggestion = (apSel.options[apSel.selectedIndex]?.text !== 'Auto populate...' ? apSel.options[apSel.selectedIndex]?.text : '') ||
                           panels.find(p => p.symbol)?.symbol || 'My Layout';
        name = prompt('Name this layout:', suggestion);
        if (!name || !name.trim()) return;
        name = name.trim();
    }

    const state = _captureState();
    state.savedAt = new Date().toISOString();
    state.name    = name;

    if (existing) {
        Object.assign(existing, state);
        _setSavedLayouts(layouts);
        toast(`Layout "${name}" saved`, 'success');
    } else {
        state.id = Date.now().toString(36) + Math.random().toString(36).slice(2);
        _activeLayoutId = state.id;
        layouts.unshift(state);
        _setSavedLayouts(layouts);
        toast(`Layout "${name}" saved`, 'success');
    }

    // Reset dropdown to "Auto populate panels" to match what was saved
    document.getElementById('autoPopulateSelect').value = '';
    document.title = name;

    saveViewState();
    if (document.getElementById('layoutsOverlay').classList.contains('open')) {
        _updateSaveBtn();
        renderLayoutsList(document.getElementById('layoutSearchInput').value);
    }
}

function deleteNamedLayout(e, id) {
    e.stopPropagation();
    const layouts = _getSavedLayouts();
    const layout  = layouts.find(l => l.id === id);
    if (!layout) return;
    if (!confirm(`Delete layout "${layout.name}"?`)) return;
    const idx = layouts.findIndex(l => l.id === id);
    layouts.splice(idx, 1);
    _setSavedLayouts(layouts);
    if (_activeLayoutId === id) _activeLayoutId = null;
    _updateSaveBtn();
    renderLayoutsList(document.getElementById('layoutSearchInput').value);
}

            if (!sym || !panels[i]) return Promise.resolve();
            return panels[i].loadSymbol(sym, null, false);
        }));
    }
})();
