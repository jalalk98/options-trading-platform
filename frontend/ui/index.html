<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Option Chart</title>

    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>

        #tooltip {
            position: absolute;
            display: none;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        body { margin: 0; font-family: Arial; }
        #chart { width: 100vw; height: 550px; }

        .topbar {
            padding: 10px;
            background: #f4f4f4;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            padding: 6px;
            width: 280px;
        }

        select {
            padding: 6px;
        }

        #currentSymbol {
            font-weight: bold;
            color: #2563eb;
        }
    </style>
</head>
<body>

<div class="topbar">
    <span>Symbol:</span>

    <input list="symbolList" id="symbolSelect" placeholder="Search strike...">
    <datalist id="symbolList"></datalist>

    </select>

</div>

<div id="chart"></div>

<div id="tooltip"></div>

<script>
/* ======================
   CHART SETUP
====================== */
const chart = LightweightCharts.createChart(
    document.getElementById('chart'),
    {
        width: window.innerWidth,
        height: 550,
        timeScale: {
            timeVisible: true,
            secondsVisible: true,

            rightOffset: 40,

            // Axis labels (bottom scale)
            tickMarkFormatter: (time) => {
                const date = new Date(time * 1000);
                return date.toLocaleTimeString('en-IN', {
                    timeZone: 'Asia/Kolkata',
                    hour12: false,
                });
            }
        },

        rightPriceScale: {
            autoScale: true,
            scaleMargins: {
                top: 0.2,
                bottom: 0.2,
         },
        },

            // 🔥 Crosshair label formatter
            localization: {
                locale: 'en-IN',

                timeFormatter: (time) => {
                    const date = new Date(time * 1000);
                    return date.toLocaleString('en-IN', {
                        timeZone: 'Asia/Kolkata',
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false,
                    });
                }
            },

        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal
        }
    }
);

const tooltip = document.getElementById('tooltip');

chart.subscribeCrosshairMove(param => {

    if (!param.point) return;

    // 🔥 Convert mouse Y position to price
    const price = candleSeries.coordinateToPrice(param.point.y);

    if (price !== null) {
        crosshairPrice = price;
    }

    if (!param.time || !param.point || !gapDetails.has(param.time)) {
        tooltip.style.display = 'none';
        return;
    }

    const g = gapDetails.get(param.time);

    tooltip.innerHTML = `
        <b>Gap ${g.dir}</b><br/>
        From: ${g.from}<br/>
        To: ${g.to}<br/>
        Jump: ${g.jump}<br/>
        Range: ${g.rangeLow} → ${g.rangeHigh}<br/>
        <b>Volume:</b> ${g.volume}
    `;

    tooltip.style.left = param.point.x + 15 + 'px';
    tooltip.style.top = param.point.y + 15 + 'px';
    tooltip.style.display = 'block';
});

const candleSeries = chart.addBarSeries({
    upColor: '#22c55e',
    downColor: '#ef4444',
    thinBars: true,
});

/* ======================
   GLOBALS
====================== */
const INTERVAL = 5;
let currentCandle = null;
let socket = null;
let reconnectTimeout = null;
let activeSymbol = null;
let gapDetails = new Map();   // time → gap metadata
let crosshairPrice = null;

/* ======================
   BUCKET FUNCTION
====================== */
function getBucketTime(epochSeconds) {
    return Math.floor(epochSeconds / INTERVAL) * INTERVAL;
}

async function loadSymbol(symbol) {
 
    if (!symbol) return;

    activeSymbol = symbol;   // ✅ track active symbol

    if (socket) {
        socket.close();
        socket = null;
    }

    if (reconnectTimeout) {
        clearTimeout(reconnectTimeout);
        reconnectTimeout = null;
    }

    candleSeries.setData([]);
    currentCandle = null;   // ✅ VERY IMPORTANT RESET
    gapDetails.clear(); 
    


    // 🔹 Load history
    const response = await fetch(`/api/history/${symbol}`);
    const history = await response.json();

    console.log("Loaded history count:", history.length);

    let candles = [];
    let tempCandle = null;

    let prevPrice = null;

    history.forEach(tick => {

        const bucketTime = getBucketTime(tick.time);
        const price = tick.value;

        console.log("History gap:", tick.is_gap);

        // ---- Build Candle ----
        if (!tempCandle || tempCandle.time !== bucketTime) {

            if (tempCandle) candles.push(tempCandle);

            tempCandle = {
                time: bucketTime,
                open: price,
                high: price,
                low: price,
                close: price
            };

        } else {
            tempCandle.high = Math.max(tempCandle.high, price);
            tempCandle.low = Math.min(tempCandle.low, price);
            tempCandle.close = price;
        }

        // ---- GAP LOGIC ----
        if (tick.is_gap && prevPrice !== null) {

            const dir = price > prevPrice ? 'D' : 'U';

            gapDetails.set(bucketTime, {
                dir,
                from: prevPrice,
                to: price,
                jump: Math.abs(price - prevPrice).toFixed(2),
                rangeLow: Math.min(prevPrice, price),
                rangeHigh: Math.max(prevPrice, price),
                volume: tick.vol_change || 0
            });
        }

        prevPrice = price;
    });

    if (tempCandle) candles.push(tempCandle);

    candleSeries.setData(candles);

    const markers = [];

    candles.forEach(c => {
        if (gapDetails.has(c.time)) {
            const info = gapDetails.get(c.time);

            markers.push({
                time: c.time,
                position: info.dir === 'D' ? 'aboveBar' : 'belowBar',
                color: info.dir === 'D' ? 'green' : 'red',
                shape: 'text',
                text: info.dir
            });
        }
    });

    candleSeries.setMarkers(markers);

    // Force price axis to recalculate
    setTimeout(() => {
        chart.priceScale('right').applyOptions({
            autoScale: true,
        });
    }, 50);


    // 🔹 Connect WebSocket AFTER history loads
    connectWebSocket(symbol);
}

function refreshMarkers() {

    candleSeries.setMarkers(
        Array.from(gapDetails.entries()).map(([time, info]) => ({

            time,
            position: info.dir === 'D' ? 'aboveBar' : 'belowBar',

            color: info.isFilled
                ? (info.dir === 'D'
                    ? 'rgba(0,128,0,0.3)'
                    : 'rgba(255,0,0,0.3)')
                : (info.dir === 'D'
                    ? 'green'
                    : 'red'),

            shape: 'text',
            text: info.dir
        }))
    );
}

function checkGapFill(currentCandle) {

    let updated = false;

    gapDetails.forEach((gap, time) => {

        if (!gap.isFilled) {

            // U gap → price must return to FROM or below
            if (
                (gap.dir === 'D' && currentCandle.low <= gap.from) ||

                // D gap → price must return to FROM or above
                (gap.dir === 'U' && currentCandle.high >= gap.from)
            ) {
                gap.isFilled = true;
                updated = true;
            }
        }
    });

    if (updated) {
        refreshMarkers();
    }
}

/* ======================
   CONNECT WS
====================== */
function connectWebSocket(symbol) {

    socket = new WebSocket(`ws://localhost:8000/ws/${symbol}`);

    socket.onopen = () => {
        console.log("Connected:", symbol);
    };

    socket.onmessage = function(event) {

        const tick = JSON.parse(event.data);

        const bucketTime = getBucketTime(tick.time);
        const price = tick.value;

        if (tick.is_gap) {

            const dir = tick.direction === "UP" ? "D" : "U";
            const prevPrice = tick.prev_price;

            gapDetails.set(bucketTime, {
                dir,
                from: prevPrice,
                to: price,
                jump: Math.abs(price - prevPrice).toFixed(2),
                rangeLow: Math.min(prevPrice, price),
                rangeHigh: Math.max(prevPrice, price),
                volume: tick.vol_change || 0,
                isFilled: false
            });

            candleSeries.setMarkers(
                Array.from(gapDetails.entries()).map(([time, info]) => ({
                    time,
                    position: info.dir === 'D' ? 'aboveBar' : 'belowBar',
                    color: info.dir === 'D' ? 'green' : 'red',
                    shape: 'text',
                    text: info.dir
                }))
            );
        }

        if (!currentCandle || currentCandle.time !== bucketTime) {

            if (currentCandle) {
                candleSeries.update(currentCandle);
            }
            
            currentCandle = {
                time: bucketTime,
                open: price,
                high: price,
                low: price,
                close: price
            };

        } else {
            currentCandle.high = Math.max(currentCandle.high, price);
            currentCandle.low = Math.min(currentCandle.low, price);
            currentCandle.close = price;
        }

        candleSeries.update(currentCandle);
        checkGapFill(currentCandle);
        // chart.timeScale().scrollToRealTime();
    };

    socket.onclose = (event) => {

    if (!activeSymbol) return;

    console.log("Socket closed. Reconnecting in 3s...");

    reconnectTimeout = setTimeout(() => {
        connectWebSocket(activeSymbol);
    }, 3000);
    };

    socket.onerror = (err) => {
        console.error("Socket error", err);
        socket.close();
    };
}

/* ======================
   ENTER KEY SUPPORT
====================== */
document.getElementById("symbolSelect")
.addEventListener("change", async function() {

    const displayValue = this.value;

    if (strikeMap[displayValue]) {
        loadSymbol(strikeMap[displayValue]);
        return;
    }

    // If manually typed, resolve from backend
    const response = await fetch(`/api/resolve-symbol?display=${displayValue}`);
    const data = await response.json();

    if (data.symbol) {
        loadSymbol(data.symbol);
    } else {
        alert("Strike not found in DB");
    }
});



let strikeMap = {};  // display → symbol mapping

async function loadStrikes() {
    const response = await fetch("/api/strikes");
    const strikes = await response.json();

    const dataList = document.getElementById("symbolList");
    dataList.innerHTML = "";
    strikeMap = {};

    strikes.forEach(item => {
        const option = document.createElement("option");
        option.value = item.display;   // user sees this
        dataList.appendChild(option);

        strikeMap[item.display] = item.symbol;  // mapping
    });

    if (strikes.length > 0) {
        const firstDisplay = strikes[0].display;
        document.getElementById("symbolSelect").value = firstDisplay;
        loadSymbol(strikeMap[firstDisplay]);
    }
}


loadStrikes();


/* ======================
   RESPONSIVE
====================== */
window.addEventListener('resize', () => {
    chart.applyOptions({ width: window.innerWidth });
});


window.addEventListener("keydown", async (e) => {

    // ignore when typing in input
    if (document.activeElement.tagName === "INPUT") {
        return;
    }

    const key = e.key.toLowerCase();

    console.log("Key pressed:", key);
    console.log("Crosshair price:", crosshairPrice);

    if (crosshairPrice === null) {
        console.log("Move mouse over chart to select price");
        return;
    }
    console.log("Sending order:", {
    symbol: activeSymbol,
    price: crosshairPrice,
    });

    if (!activeSymbol) {
        console.log("No symbol selected");
        return;
    }

    if (key === "q") {

        console.log("SL BUY triggered");

        await fetch("/api/place-sl-order", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                symbol: activeSymbol,
                price: Number(crosshairPrice.toFixed(2)),
                side: "BUY"
            })
        });
    }

    if (key === "w") {

        console.log("SL SELL triggered");

        await fetch("/api/place-sl-order", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                symbol: activeSymbol,
                price: Number(crosshairPrice.toFixed(2)),
                side: "SELL"
            })
        });
    }

});


</script>

</body>
</html>
